<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Yo · Diario Íntimo (Tonos Intermedios)</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ===== PALETA PURPLENAVY - TONOS INTERMEDIOS ===== */
        :root {
            --purplenavy: #4A5070;      /* HEX 4A5070 (intermedio) */
            --cadetgrey: #8A89B0;        /* HEX 8A89B0 (intermedio) */
            --lilac: #B594C0;             /* HEX B594C0 (intermedio) */
            --parrotpink: #D4869C;         /* HEX D4869C (intermedio) */
            --wildblueyonder: #93A5CA;     /* HEX 93A5CA (intermedio) */
            --text-dark: #2A2A35;
            --text-soft: #4F4F60;
            --bg-soft: rgba(45, 40, 50, 0.7);
            --bg-card: rgba(55, 50, 60, 0.8);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #404566 0%, #6D5A7A 35%, #B57A8A 70%, #3A3F55 100%);
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
            color: #F0E6F5;
        }

        /* ===== FONDO DE SNOOPYS VOLADORES ===== */
        .snoopy-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .snoopy-falling {
            position: absolute;
            font-size: clamp(1.8rem, 6vw, 4.5rem);
            opacity: 0.18;
            color: rgba(245, 230, 255, 0.4);
            text-shadow: 0 0 8px rgba(74,80,112,0.5);
            animation: fall linear infinite;
            user-select: none;
            filter: drop-shadow(0 4px 8px var(--purplenavy));
        }

        @keyframes fall {
            0% { transform: translateY(-20vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.45; }
            90% { opacity: 0.35; }
            100% { transform: translateY(120vh) rotate(360deg); opacity: 0; }
        }

        .snoopy-falling::before {
            content: "🐶";
            font-size: 1.2em;
            margin-right: 5px;
        }
        .snoopy-falling::after {
            content: "⚾";
            font-size: 0.7em;
            margin-left: 5px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 10;
        }

        /* ===== ALERTAS ===== */
        .alerta-personalizada {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-width: 360px;
        }

        .alerta {
            background: rgba(50, 45, 55, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            padding: 18px 22px;
            box-shadow: 0 12px 28px rgba(0,0,0,0.3), 0 0 0 2px rgba(138,137,176,0.3);
            border-left: 10px solid;
            display: flex;
            align-items: center;
            gap: 18px;
            animation: slideInRight 0.4s cubic-bezier(0.2, 0.9, 0.3, 1.1);
            border: 2px solid rgba(220,200,240,0.3);
            color: #F5E8F5;
        }

        .alerta.exito { border-left-color: var(--purplenavy); background: linear-gradient(135deg, #3A3A4A, var(--lilac)); }
        .alerta.error { border-left-color: var(--parrotpink); background: linear-gradient(135deg, #3A3A4A, #8A5A6A); }
        .alerta.advertencia { border-left-color: var(--wildblueyonder); background: linear-gradient(135deg, #3A3A4A, #5A6A8A); }

        .alerta i { font-size: 2.4rem; }
        .alerta.exito i { color: var(--cadetgrey); }
        .alerta.error i { color: var(--parrotpink); }
        .alerta.advertencia i { color: var(--wildblueyonder); }

        .alerta-contenido { flex: 1; }
        .alerta-titulo { font-weight: 700; color: #F2D5F2; margin-bottom: 4px; }
        .alerta-mensaje { color: #D0C0E0; font-size: 0.95rem; }
        .alerta-cerrar { cursor: pointer; opacity: 0.7; transition: 0.2s; }
        .alerta-cerrar:hover { opacity: 1; color: var(--parrotpink); transform: scale(1.2); }

        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(40px) rotate(2deg); }
            to { opacity: 1; transform: translateX(0) rotate(0); }
        }

        /* ===== HEADER PERFIL ===== */
        .perfil-header {
            background: rgba(45, 40, 50, 0.7);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 30px 40px;
            margin-bottom: 30px;
            box-shadow: 0 12px 28px rgba(0,0,0,0.4), 0 4px 20px rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            gap: 40px;
            flex-wrap: wrap;
            border: 3px solid rgba(147,165,202,0.5);
            position: relative;
            overflow: hidden;
            color: #F5E5F5;
        }

        .perfil-header::before {
            content: "🐶🐾🐾";
            position: absolute;
            font-size: 7rem;
            bottom: -20px;
            right: -10px;
            opacity: 0.1;
            transform: rotate(-15deg);
            white-space: nowrap;
            pointer-events: none;
            color: white;
        }

        .foto-perfil-container {
            position: relative;
            width: 150px;
            height: 150px;
            border-radius: 50%;
            overflow: hidden;
            border: 5px solid var(--cadetgrey);
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            cursor: pointer;
            transition: all 0.4s ease;
            z-index: 5;
            background: linear-gradient(45deg, var(--lilac), var(--parrotpink));
        }

        .foto-perfil-container:hover { transform: scale(1.05) rotate(4deg); border-color: var(--purplenavy); }

        .foto-perfil { width: 100%; height: 100%; object-fit: cover; display: none; }
        .foto-perfil-placeholder {
            width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            font-size: 4rem; color: white;
            background: linear-gradient(145deg, var(--purplenavy), var(--wildblueyonder));
        }

        .cambiar-foto {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: rgba(100, 90, 120, 0.9);
            color: white; text-align: center; padding: 8px;
            font-size: 0.9rem; backdrop-filter: blur(5px);
            opacity: 0; transition: 0.3s; cursor: pointer;
        }
        .foto-perfil-container:hover .cambiar-foto { opacity: 1; }

        .info-perfil { flex: 1; z-index: 5; }
        .info-perfil h1 {
            font-size: 2.6rem; font-weight: 700;
            color: #F0D0F0; text-shadow: 2px 2px 0 rgba(0,0,0,0.3);
            margin-bottom: 10px; display: flex; align-items: center; gap: 12px;
        }
        .info-perfil h1 i { color: var(--parrotpink); }

        .nombre-perfil {
            font-size: 2rem; font-weight: 600; color: #F0D8F0;
            background: transparent; border: none; border-bottom: 3px dashed var(--cadetgrey);
            width: 100%; max-width: 450px; padding: 5px 12px; margin-bottom: 15px;
            transition: 0.2s;
        }
        .nombre-perfil:focus { outline: none; border-bottom-color: var(--parrotpink); background: rgba(70, 50, 70, 0.3); border-radius: 8px; }

        .frase-perfil {
            width: 100%; max-width: 650px; padding: 18px 25px;
            background: rgba(50, 45, 55, 0.6);
            backdrop-filter: blur(10px);
            border: 3px solid var(--wildblueyonder);
            border-radius: 60px;
            font-size: 1.3rem;
            font-style: italic;
            color: #F5D5F5;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.2);
            transition: all 0.3s;
            min-height: 80px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-weight: 500;
            letter-spacing: 0.3px;
            position: relative;
            gap: 10px;
        }
        .frase-perfil:hover {
            background: rgba(70, 55, 70, 0.8);
            border-color: var(--parrotpink);
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(200,120,140,0.3);
        }
        .frase-perfil i { font-size: 1.8rem; color: var(--cadetgrey); }
        #randomPhraseBtn {
            background: transparent; border: none; font-size: 1.8rem;
            cursor: pointer; color: var(--cadetgrey); transition: 0.2s;
        }
        #randomPhraseBtn:hover { color: var(--parrotpink); transform: rotate(90deg); }

        /* ===== TARJETAS RESUMEN ===== */
        .resumen-cards {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 22px; margin-bottom: 35px;
        }
        .card {
            background: rgba(50, 45, 55, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 30px; padding: 25px 15px;
            box-shadow: 0 12px 20px rgba(0,0,0,0.3);
            border: 2px solid var(--cadetgrey);
            transition: 0.3s; text-align: center;
            color: #F5E0F5;
        }
        .card:hover {
            background: rgba(70, 60, 75, 0.9);
            border-color: var(--purplenavy);
            transform: translateY(-8px) rotate(0.5deg);
            box-shadow: 0 20px 30px rgba(180,120,140,0.35);
        }
        .card h3 { color: #E8C5E8; font-size: 1.1rem; margin-bottom: 12px; gap: 8px; display: flex; align-items: center; justify-content: center; }
        .card .valor { font-size: 2.5rem; font-weight: 800; color: var(--parrotpink); text-shadow: 2px 2px 0 var(--lilac); }

        /* ===== TABS ===== */
        .tabs-nav {
            display: flex; gap: 15px; margin-bottom: 30px; flex-wrap: wrap; justify-content: center;
        }
        .tab-btn {
            padding: 15px 28px; background: rgba(60, 55, 65, 0.7); backdrop-filter: blur(8px);
            border: 3px solid var(--lilac); color: #F5D5F5; border-radius: 50px;
            font-weight: 700; font-size: 1rem; cursor: pointer; transition: all 0.3s;
            display: flex; align-items: center; gap: 8px;
        }
        .tab-btn:hover {
            background: var(--purplenavy); color: white; border-color: var(--parrotpink);
            transform: scale(1.05) translateY(-4px); box-shadow: 0 12px 18px rgba(0,0,0,0.4);
        }
        .tab-btn.active {
            background: linear-gradient(145deg, var(--purplenavy), var(--wildblueyonder));
            color: white; border-color: white;
        }

        .tab-section { display: none; animation: fadeScale 0.5s; }
        .tab-section.active { display: block; }
        @keyframes fadeScale { from { opacity: 0.3; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        /* ===== ESTILOS DE SECCIONES ===== */
        .diario-section, .quiensoy-section {
            background: rgba(45, 40, 50, 0.7); backdrop-filter: blur(16px);
            border-radius: 40px; padding: 35px; border: 2px solid rgba(138,137,176,0.5);
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
            color: #F5E5F5;
        }
        .diario-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; flex-wrap: wrap; gap: 20px; }
        .diario-header h2 { color: #E8C8E8; font-size: 2rem; display: flex; align-items: center; gap: 10px; }

        .diario-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(310px, 1fr)); gap: 25px; }
        .entrada-diario {
            background: rgba(55, 50, 60, 0.8); backdrop-filter: blur(4px);
            border-radius: 30px; padding: 25px; border: 2px solid var(--lilac);
            transition: 0.3s; box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            position: relative;
            color: #F5E0F5;
            cursor: pointer;
        }
        .entrada-diario:hover { border-color: var(--parrotpink); transform: scale(1.02) rotate(0.2deg); background: rgba(80, 65, 80, 0.9); }
        
        .entrada-diario .acciones-btn {
            position: absolute; top: 10px; right: 15px;
            display: flex; gap: 8px;
            background: transparent; 
        }
        .entrada-diario .acciones-btn button {
            background: rgba(50,40,55,0.8);
            border: 1px solid var(--cadetgrey);
            border-radius: 20px;
            width: 32px; height: 32px;
            color: #F5D5F5;
            cursor: pointer;
            transition: 0.2s;
            backdrop-filter: blur(4px);
        }
        .entrada-diario .acciones-btn button:hover {
            background: var(--parrotpink);
            color: white;
            border-color: white;
            transform: scale(1.1);
        }
        
        /* Estado de ánimo con emojis */
        .estado-animo {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            margin-top: 8px;
            font-size: 1.5rem;
            background: rgba(138,137,176,0.2);
            padding: 5px 12px;
            border-radius: 40px;
            border: 1px solid var(--cadetgrey);
        }

        .gustos-actuales {
            background: linear-gradient(125deg, var(--purplenavy), var(--cadetgrey), var(--wildblueyonder));
            padding: 25px; border-radius: 30px; display: grid; grid-template-columns: repeat(auto-fit, minmax(180px,1fr)); gap: 15px;
            margin-bottom: 40px; border: 3px solid rgba(255,255,255,0.3); color: white;
        }
        .gusto-item { background: rgba(0,0,0,0.2); backdrop-filter: blur(4px); border-radius: 28px; padding: 15px; text-align: center; border: 1px solid rgba(255,255,255,0.3); }
        .gusto-item h4 { font-weight: 300; font-size: 0.9rem; margin-bottom: 8px; opacity: 0.9; }
        .gusto-item p { font-weight: 700; font-size: 1.3rem; }

        .historial-timeline { 
            padding-left: 20px; 
            border-left: 5px dotted var(--cadetgrey);
            margin-top: 30px;
        }
        .historial-entry {
            background: rgba(60, 50, 60, 0.6); 
            backdrop-filter: blur(4px);
            border-radius: 25px; 
            padding: 20px; 
            margin-bottom: 20px; 
            border: 2px solid var(--lilac);
            position: relative;
            color: #F5E0F5;
        }
        .historial-entry::before {
            content: "🐶"; 
            position: absolute; 
            left: -35px; 
            top: 20px; 
            font-size: 1.8rem;
            filter: drop-shadow(2px 4px 4px black);
        }
        
        .historial-entry .acciones-historial {
            display: flex;
            gap: 12px;
            margin-top: 15px;
            justify-content: flex-end;
        }
        
        .historial-entry .acciones-historial button {
            background: rgba(80, 70, 90, 0.7);
            border: 1px solid var(--cadetgrey);
            border-radius: 30px;
            padding: 8px 18px;
            color: #F5E0F5;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.9rem;
        }
        
        .historial-entry .acciones-historial button:hover {
            background: var(--parrotpink);
            border-color: white;
            color: white;
        }
        
        .historial-entry .acciones-historial button.editar:hover {
            background: var(--wildblueyonder);
        }
        
        .historial-entry .acciones-historial button.eliminar:hover {
            background: var(--parrotpink);
        }

        .btn-primary {
            background: linear-gradient(130deg, var(--purplenavy), var(--wildblueyonder));
            border: none; color: white; padding: 14px 28px; border-radius: 50px;
            font-weight: 600; display: flex; align-items: center; gap: 10px;
            transition: 0.3s; box-shadow: 0 8px 14px rgba(0,0,0,0.4);
            cursor: pointer;
        }
        .btn-primary:hover { background: var(--parrotpink); transform: scale(1.05); box-shadow: 0 12px 20px rgba(0,0,0,0.5); }

        .btn-secondary { background: transparent; border: 3px solid var(--cadetgrey); color: #F5D5F5; padding: 12px 26px; border-radius: 40px; font-weight: 600; cursor: pointer; }
        .btn-secondary:hover { background: var(--purplenavy); color: white; border-color: white; }

        /* MODAL */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(45, 40, 50, 0.85); backdrop-filter: blur(12px);
            display: none; justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: rgba(55, 50, 60, 0.95); border-radius: 50px; padding: 40px;
            max-width: 650px; width: 90%; border: 5px solid var(--lilac);
            box-shadow: 0 30px 50px rgba(0,0,0,0.5);
            max-height: 85vh; overflow-y: auto;
            color: #F5E5F5;
        }
        .modal h2 { color: #E8C8E8; display: flex; align-items: center; gap: 10px; margin-bottom: 25px; }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #E8C0E8; font-weight: 500; }
        input, textarea, select {
            background: #3A3540; border: 2px solid var(--cadetgrey); border-radius: 25px; 
            padding: 14px 18px; width: 100%; font-size: 1rem;
            color: #F5E5F5;
        }
        textarea { min-height: 100px; resize: vertical; }
        
        /* Modal de solo lectura */
        .modal-lectura .contenido-lectura {
            background: #3A3540;
            border-radius: 30px;
            padding: 25px;
            margin: 20px 0;
            border: 2px solid var(--lilac);
            white-space: pre-wrap;
            line-height: 1.6;
        }
        
        .acciones-lectura {
            display: flex;
            gap: 15px;
            justify-content: flex-end;
            margin-top: 25px;
        }
    </style>
</head>
<body>
    <div class="snoopy-bg" id="snoopyBg"></div>
    <div class="alerta-personalizada" id="alertaContainer"></div>

    <div class="container">
        <header class="perfil-header">
            <div class="foto-perfil-container" onclick="document.getElementById('inputFotoPerfil').click()">
                <div class="foto-perfil-placeholder" id="fotoPerfilPlaceholder">
                    <i class="fas fa-dog"></i>
                </div>
                <img id="fotoPerfil" class="foto-perfil" src="#" alt="perfil" style="display: none;">
                <div class="cambiar-foto"><i class="fas fa-camera"></i> Shana</div>
                <input type="file" id="inputFotoPerfil" accept="image/*" style="display: none;" onchange="cambiarFotoPerfil(event)">
            </div>

            <div class="info-perfil">
                <h1><i class="fas fa-feather"></i> Mi Yo · Diario</h1>
                <input type="text" class="nombre-perfil" id="nombrePerfil" value="Amiga de Snoopy" placeholder="Tu nombre...">
                <div class="frase-perfil" id="frasePerfil" onclick="cambiarFraseAleatoria()">
                    <i class="fas fa-quote-right"></i>
                    <span id="fraseTexto">Cargando frase...</span>
                    <i class="fas fa-sync-alt" id="randomPhraseBtn" title="Nueva frase" onclick="event.stopPropagation();cambiarFraseAleatoria()"></i>
                </div>
            </div>
        </header>

        <div class="resumen-cards">
            <div class="card"><h3><i class="fas fa-book-open"></i> Diario</h3><div class="valor" id="totalDiario">0</div></div>
            <div class="card"><h3><i class="fas fa-cloud"></i> Sueños</h3><div class="valor" id="totalSuenos">0</div></div>
            <div class="card"><h3><i class="fas fa-bullseye"></i> Metas</h3><div class="valor" id="totalMetas">0</div></div>
            <div class="card"><h3><i class="fas fa-history"></i> Quién Soy</h3><div class="valor" id="totalGustos">0</div></div>
        </div>

        <div class="tabs-nav">
            <button class="tab-btn active" data-tab="diario"><i class="fas fa-book-open"></i> Diario</button>
            <button class="tab-btn" data-tab="quiensoy"><i class="fas fa-user-circle"></i> Quién Soy</button>
            <button class="tab-btn" data-tab="suenos"><i class="fas fa-cloud"></i> Sueños</button>
            <button class="tab-btn" data-tab="metas"><i class="fas fa-bullseye"></i> Metas</button>
            <button class="tab-btn" data-tab="carta"><i class="fas fa-envelope"></i> Carta al futuro</button>
        </div>

        <!-- SECCIÓN DIARIO -->
        <section class="tab-section active" id="tab-diario">
            <div class="diario-section">
                <div class="diario-header">
                    <h2><i class="fas fa-heart" style="color:var(--parrotpink);"></i> Mi Diario</h2>
                    <button class="btn-primary" onclick="abrirModal('diario')"><i class="fas fa-plus"></i> Nueva entrada</button>
                </div>
                <div class="diario-grid" id="diarioGrid"></div>
            </div>
        </section>

        <!-- SECCIÓN QUIÉN SOY -->
        <section class="tab-section" id="tab-quiensoy">
            <div class="quiensoy-section">
                <div class="diario-header">
                    <h2><i class="fas fa-user-astronaut"></i> Quién Soy</h2>
                    <button class="btn-primary" onclick="abrirModal('quiensoy')"><i class="fas fa-plus"></i> Nuevo momento</button>
                </div>
                <div class="gustos-actuales" id="gustosActuales"></div>
                <h3 style="margin: 30px 0 15px 0; color: #E8C0E8;"><i class="fas fa-history"></i> Historial de momentos</h3>
                <div class="historial-timeline" id="historialGustos"></div>
            </div>
        </section>

        <!-- SECCIÓN SUEÑOS -->
        <section class="tab-section" id="tab-suenos">
            <div class="diario-section">
                <div class="diario-header">
                    <h2><i class="fas fa-cloud-sun"></i> Sueños</h2>
                    <button class="btn-primary" onclick="abrirModal('sueno')"><i class="fas fa-plus"></i> Nuevo sueño</button>
                </div>
                <div class="diario-grid" id="suenosGrid"></div>
            </div>
        </section>

        <!-- SECCIÓN METAS -->
        <section class="tab-section" id="tab-metas">
            <div class="diario-section">
                <div class="diario-header">
                    <h2><i class="fas fa-bullseye"></i> Metas</h2>
                    <button class="btn-primary" onclick="abrirModal('meta')"><i class="fas fa-plus"></i> Nueva meta</button>
                </div>
                <div class="diario-grid" id="metasGrid"></div>
            </div>
        </section>

        <!-- SECCIÓN CARTAS -->
        <section class="tab-section" id="tab-carta">
            <div class="diario-section">
                <div class="diario-header">
                    <h2><i class="fas fa-envelope-open-text"></i> Cartas al futuro</h2>
                    <button class="btn-primary" onclick="abrirModal('carta')"><i class="fas fa-plus"></i> Nueva carta</button>
                </div>
                <div class="diario-grid" id="cartasGrid"></div>
            </div>
        </section>
    </div>

    <!-- MODAL GENERICO -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="modal">
            <h2 id="modalTitle"></h2>
            <form id="modalForm">
                <div id="modalContent"></div>
                <div style="display:flex; gap:15px; justify-content:flex-end; margin-top:30px;">
                    <button type="button" class="btn-secondary" onclick="cerrarModal()">Cancelar</button>
                    <button type="submit" class="btn-primary">Guardar</button>
                </div>
            </form>
        </div>
    </div>
    
    <!-- MODAL DE LECTURA (SOLO VER) -->
    <div class="modal-overlay" id="modalLecturaOverlay">
        <div class="modal modal-lectura" id="modalLectura">
            <h2 id="modalLecturaTitulo"><i class="fas fa-book-open"></i> Leyendo entrada</h2>
            <div id="modalLecturaContenido" class="contenido-lectura"></div>
            <div class="acciones-lectura">
                <button class="btn-secondary" onclick="cerrarModalLectura()">Cerrar</button>
                <button class="btn-primary" id="btnEditarDesdeLectura" onclick="editarDesdeLectura()"><i class="fas fa-edit"></i> Editar</button>
                <button class="btn-primary" style="background: var(--parrotpink);" id="btnEliminarDesdeLectura" onclick="eliminarDesdeLectura()"><i class="fas fa-trash"></i> Eliminar</button>
            </div>
        </div>
    </div>

    <script>
        // ===== FRASES ALEATORIAS =====
        const FRASES_ALEATORIAS = [
            "🐶 La vida es como una tarde de juegos con Snoopy.",
            "Sigue tus sueños, ellos conocen el camino ✨",
            "Sé amable contigo misma, hoy y siempre.",
            "Nunca es tarde para ser quien quieres ser.",
            "🐾 La felicidad es un paseo con tu mejor amigo.",
            "Mi yo del futuro me agradecerá cada paso.",
            "Las pequeñas cosas son las que llenan el alma.",
            "Snoopy dijo: «Vale la pena volar cometas».",
            "Hoy puede ser un gran día.",
            "Eres más fuerte de lo que crees 💪",
            "La vida no es perfecta, pero tu diario sí.",
            "Confía en tu proceso, florecerás.",
            "🐕‍🦺 Un día a la vez, con pausa y ternura.",
            "Escribe, sueña, vuelve a empezar."
        ];
        
        // ===== EMOJIS PARA ESTADO DE ÁNIMO =====
        const EMOJIS_ANIMO = [
            "😊 Feliz", "😢 Triste", "😌 Tranquila", "🤔 Pensativa", 
            "😤 Estresada", "🥰 Enamorada", "😴 Cansada", "🤩 Inspirada",
            "😡 Enojada", "😨 Asustada", "🥳 Alegre", "😶‍🌫️ Confundida",
            "💪 Motivada", "🫂 Agradecida", "✨ Creativa", "🌧️ Melancólica"
        ];

        // ===== ESTRUCTURA DE DATOS =====
        let entradasDiario = JSON.parse(localStorage.getItem('miYo_diario_intermedio')) || [];
        let suenos = JSON.parse(localStorage.getItem('miYo_suenos_intermedio')) || [];
        let metas = JSON.parse(localStorage.getItem('miYo_metas_intermedio')) || [];
        let cartasFuturo = JSON.parse(localStorage.getItem('miYo_cartas_intermedio')) || [];
        let historialGustos = JSON.parse(localStorage.getItem('miYo_historialGustos_intermedio')) || [];
        
        let perfil = JSON.parse(localStorage.getItem('miYo_perfil_intermedio')) || {
            nombre: 'Amiga de Snoopy',
            frase: FRASES_ALEATORIAS[0],
            foto: null
        };

        let modalTipo = null;
        let modalEditandoId = null;
        let elementoEnLectura = null;

        // ===== SNOOPYS FONDO =====
        function crearSnoopysCayendo(cantidad = 22) {
            const bg = document.getElementById('snoopyBg');
            bg.innerHTML = '';
            for (let i = 0; i < cantidad; i++) {
                const snoopy = document.createElement('div');
                snoopy.className = 'snoopy-falling';
                snoopy.style.left = Math.random() * 100 + '%';
                snoopy.style.animationDuration = 6 + Math.random() * 14 + 's';
                snoopy.style.animationDelay = Math.random() * -20 + 's';
                snoopy.style.opacity = 0.15 + Math.random() * 0.15;
                snoopy.innerHTML = Math.random() > 0.5 ? '🐶☁️' : '⚾🐶';
                bg.appendChild(snoopy);
            }
        }

        // ===== ALERTAS =====
        function mostrarAlerta(tipo, titulo, mensaje) {
            const container = document.getElementById('alertaContainer');
            const id = Date.now();
            const alerta = document.createElement('div');
            alerta.className = `alerta ${tipo}`;
            alerta.id = `alerta-${id}`;
            const icono = tipo === 'exito' ? 'fa-check-circle' : (tipo === 'error' ? 'fa-exclamation-circle' : 'fa-exclamation-triangle');
            alerta.innerHTML = `
                <i class="fas ${icono}"></i>
                <div class="alerta-contenido">
                    <div class="alerta-titulo">${titulo}</div>
                    <div class="alerta-mensaje">${mensaje}</div>
                </div>
                <div class="alerta-cerrar" onclick="cerrarAlerta(${id})">
                    <i class="fas fa-times"></i>
                </div>
            `;
            container.appendChild(alerta);
            setTimeout(() => { const el = document.getElementById(`alerta-${id}`); if(el) el.remove(); }, 3500);
        }
        function cerrarAlerta(id) { const el = document.getElementById(`alerta-${id}`); if(el) el.remove(); }

        // ===== FRASE ALEATORIA =====
        function cambiarFraseAleatoria() {
            const indice = Math.floor(Math.random() * FRASES_ALEATORIAS.length);
            const nuevaFrase = FRASES_ALEATORIAS[indice];
            document.getElementById('fraseTexto').innerText = nuevaFrase;
            perfil.frase = nuevaFrase;
            guardarDatos();
            mostrarAlerta('exito', 'Frase renovada', 'Una nueva inspiración para ti ✨');
        }

        // ===== INICIALIZACIÓN =====
        document.addEventListener('DOMContentLoaded', function() {
            crearSnoopysCayendo(22);
            cargarDatosEjemplo();
            cargarPerfil();
            renderizarTodo();
            configurarTabs();

            if (!perfil.frase || perfil.frase === '"Conócete a ti mismo"') {
                perfil.frase = FRASES_ALEATORIAS[Math.floor(Math.random() * FRASES_ALEATORIAS.length)];
            }
            document.getElementById('fraseTexto').innerText = perfil.frase;

            mostrarAlerta('exito', '🐶 ¡Bienvenida!', 'Todos los módulos funcionando (tonos intermedios)');
        });

        function cargarDatosEjemplo() {
            if (entradasDiario.length === 0) {
                entradasDiario = [{ 
                    id: Date.now() - 86400000, 
                    fecha: new Date().toISOString().split('T')[0], 
                    titulo: 'Mi primera entrada', 
                    contenido: 'Hoy escribí con Snoopy al lado', 
                    animo: '😊 Feliz' 
                }];
            }
            if (historialGustos.length === 0) {
                historialGustos = [{ 
                    id: Date.now() - 10000000, 
                    fecha: new Date().toISOString().split('T')[0], 
                    colorFavorito: 'Lila intermedio', 
                    musicaFavorita: 'Indie', 
                    comidaFavorita: 'pizza', 
                    libroFavorito: 'El principito', 
                    peliculaFavorita: 'Intensamente', 
                    hobby: 'dibujar', 
                    frase: '🐶 Snoopy es mi inspiración' 
                }];
            }
            if (suenos.length === 0) {
                suenos = [{ 
                    id: Date.now(), 
                    titulo: 'Viajar a Japón', 
                    descripcion: 'ver cerezos', 
                    categoria: 'viajes', 
                    fecha: new Date().toISOString().split('T')[0] 
                }];
            }
            if (metas.length === 0) {
                metas = [{ 
                    id: Date.now(), 
                    titulo: 'Aprender a meditar', 
                    categoria: 'bienestar', 
                    progreso: 20, 
                    fechaLimite: '2026-06-01' 
                }];
            }
            if (cartasFuturo.length === 0) {
                cartasFuturo = [{ 
                    id: Date.now(), 
                    fecha: new Date().toISOString().split('T')[0], 
                    contenido: 'Querida yo, sigue soñando', 
                    destinatario: 'Yo del futuro' 
                }];
            }
            guardarDatos();
        }

        function guardarDatos() { 
            localStorage.setItem('miYo_diario_intermedio', JSON.stringify(entradasDiario));
            localStorage.setItem('miYo_suenos_intermedio', JSON.stringify(suenos));
            localStorage.setItem('miYo_metas_intermedio', JSON.stringify(metas));
            localStorage.setItem('miYo_cartas_intermedio', JSON.stringify(cartasFuturo));
            localStorage.setItem('miYo_historialGustos_intermedio', JSON.stringify(historialGustos));
            localStorage.setItem('miYo_perfil_intermedio', JSON.stringify(perfil));
        }

        function cargarPerfil() {
            document.getElementById('nombrePerfil').value = perfil.nombre;
            document.getElementById('nombrePerfil').addEventListener('input', function() { 
                perfil.nombre = this.value; 
                guardarDatos(); 
            });
            if (perfil.foto) {
                document.getElementById('fotoPerfil').src = perfil.foto;
                document.getElementById('fotoPerfil').style.display = 'block';
                document.getElementById('fotoPerfilPlaceholder').style.display = 'none';
            }
        }

        function cambiarFotoPerfil(e) {
            const file = e.target.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = function(ev) {
                    perfil.foto = ev.target.result;
                    document.getElementById('fotoPerfil').src = ev.target.result;
                    document.getElementById('fotoPerfil').style.display = 'block';
                    document.getElementById('fotoPerfilPlaceholder').style.display = 'none';
                    guardarDatos(); 
                    mostrarAlerta('exito', 'Foto actualizada', '¡Qué guapa!');
                }; 
                reader.readAsDataURL(file);
            }
        }

        function configurarTabs() {
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    document.querySelectorAll('.tab-section').forEach(s => s.classList.remove('active'));
                    this.classList.add('active');
                    document.getElementById(`tab-${this.dataset.tab}`).classList.add('active');
                });
            });
        }

        // ===== RENDERIZADO =====
        function renderizarTodo() {
            renderizarDiario();
            renderizarQuienSoy();
            renderizarSuenos();
            renderizarMetas();
            renderizarCartas();
            actualizarResumen();
        }

        function actualizarResumen() {
            document.getElementById('totalDiario').innerText = entradasDiario.length;
            document.getElementById('totalSuenos').innerText = suenos.length;
            document.getElementById('totalMetas').innerText = metas.length;
            document.getElementById('totalGustos').innerText = historialGustos.length;
        }

        function renderizarDiario() {
            const grid = document.getElementById('diarioGrid');
            if (!entradasDiario.length) { 
                grid.innerHTML = '<p style="padding:40px; text-align:center;">Escribe tu primera entrada 📖</p>'; 
                return; 
            }
            grid.innerHTML = entradasDiario.map(e => `
                <div class="entrada-diario" onclick="verEntrada(${e.id})">
                    <div class="acciones-btn" onclick="event.stopPropagation()">
                        <button onclick="editarEntrada(${e.id})" title="Editar"><i class="fas fa-edit"></i></button>
                        <button onclick="eliminarEntrada('diario', ${e.id})" title="Eliminar"><i class="fas fa-times"></i></button>
                    </div>
                    <strong>${e.fecha}</strong><br>
                    <h3 style="margin:8px 0">${e.titulo}</h3>
                    <p>${e.contenido.substring(0,60)}${e.contenido.length>60?'…':''}</p>
                    <div class="estado-animo">${e.animo || '😊'}</div>
                </div>`).join('');
        }

        function renderizarQuienSoy() {
            const actual = historialGustos.sort((a,b)=>new Date(b.fecha)-new Date(a.fecha))[0];
            if(actual) {
                document.getElementById('gustosActuales').innerHTML = `
                    <div class="gusto-item"><h4>🎨 Color</h4><p>${actual.colorFavorito||'-'}</p></div>
                    <div class="gusto-item"><h4>🎵 Música</h4><p>${actual.musicaFavorita||'-'}</p></div>
                    <div class="gusto-item"><h4>🍽️ Comida</h4><p>${actual.comidaFavorita||'-'}</p></div>
                    <div class="gusto-item"><h4>📚 Libro</h4><p>${actual.libroFavorito||'-'}</p></div>
                    <div class="gusto-item"><h4>🎬 Película</h4><p>${actual.peliculaFavorita||'-'}</p></div>
                    <div class="gusto-item"><h4>⚽ Hobby</h4><p>${actual.hobby||'-'}</p></div>`;
            } else {
                document.getElementById('gustosActuales').innerHTML = '<p style="grid-column:1/-1; text-align:center;">Aún no hay gustos registrados</p>';
            }
            
            // Renderizar historial con botones de editar/eliminar funcionales
            document.getElementById('historialGustos').innerHTML = historialGustos.sort((a,b)=>new Date(b.fecha)-new Date(a.fecha)).map(g => `
                <div class="historial-entry">
                    <div style="font-weight:bold; margin-bottom:10px;">📅 ${g.fecha}</div>
                    <div style="display:grid; grid-template-columns:repeat(2,1fr); gap:10px; margin-bottom:15px;">
                        <div><span style="color:var(--cadetgrey);">🎨 Color:</span> ${g.colorFavorito||'-'}</div>
                        <div><span style="color:var(--cadetgrey);">🎵 Música:</span> ${g.musicaFavorita||'-'}</div>
                        <div><span style="color:var(--cadetgrey);">🍽️ Comida:</span> ${g.comidaFavorita||'-'}</div>
                        <div><span style="color:var(--cadetgrey);">📚 Libro:</span> ${g.libroFavorito||'-'}</div>
                        <div><span style="color:var(--cadetgrey);">🎬 Película:</span> ${g.peliculaFavorita||'-'}</div>
                        <div><span style="color:var(--cadetgrey);">⚽ Hobby:</span> ${g.hobby||'-'}</div>
                    </div>
                    ${g.frase ? `<div style="font-style:italic; margin-bottom:15px;"><i class="fas fa-quote-left" style="color:var(--cadetgrey);"></i> ${g.frase}</div>` : ''}
                    <div class="acciones-historial">
                        <button class="editar" onclick="editarGusto(${g.id}); event.stopPropagation();"><i class="fas fa-edit"></i> Editar</button>
                        <button class="eliminar" onclick="eliminarGusto(${g.id}); event.stopPropagation();"><i class="fas fa-trash"></i> Eliminar</button>
                    </div>
                </div>`).join('');
        }

        function renderizarSuenos() {
            const grid = document.getElementById('suenosGrid');
            if (!suenos.length) { grid.innerHTML = '<p style="padding:40px; text-align:center;">Agrega tu primer sueño ✨</p>'; return; }
            grid.innerHTML = suenos.map(s => `
                <div class="entrada-diario" onclick="verSueño(${s.id})">
                    <div class="acciones-btn" onclick="event.stopPropagation()">
                        <button onclick="editarSueno(${s.id})"><i class="fas fa-edit"></i></button>
                        <button onclick="eliminarEntrada('sueno', ${s.id})"><i class="fas fa-times"></i></button>
                    </div>
                    <strong>${s.fecha}</strong><br>
                    <h3>✨ ${s.titulo}</h3>
                    <p>${s.descripcion || ''} · ${s.categoria || ''}</p>
                </div>`).join('');
        }

        function renderizarMetas() {
            const grid = document.getElementById('metasGrid');
            if (!metas.length) { grid.innerHTML = '<p style="padding:40px; text-align:center;">Agrega tu primera meta 🎯</p>'; return; }
            grid.innerHTML = metas.map(m => `
                <div class="entrada-diario" onclick="verMeta(${m.id})">
                    <div class="acciones-btn" onclick="event.stopPropagation()">
                        <button onclick="editarMeta(${m.id})"><i class="fas fa-edit"></i></button>
                        <button onclick="eliminarEntrada('meta', ${m.id})"><i class="fas fa-times"></i></button>
                    </div>
                    <strong>${m.fechaLimite || 'Sin fecha'}</strong><br>
                    <h3>🎯 ${m.titulo}</h3>
                    <p>Progreso: ${m.progreso || 0}% · ${m.categoria || ''}</p>
                </div>`).join('');
        }

        function renderizarCartas() {
            const grid = document.getElementById('cartasGrid');
            if (!cartasFuturo.length) { grid.innerHTML = '<p style="padding:40px; text-align:center;">Escribe tu primera carta 💌</p>'; return; }
            grid.innerHTML = cartasFuturo.map(c => `
                <div class="entrada-diario" onclick="verCarta(${c.id})">
                    <div class="acciones-btn" onclick="event.stopPropagation()">
                        <button onclick="editarCarta(${c.id})"><i class="fas fa-edit"></i></button>
                        <button onclick="eliminarEntrada('carta', ${c.id})"><i class="fas fa-times"></i></button>
                    </div>
                    <strong>📬 ${c.fecha}</strong><br>
                    <h3>Para: ${c.destinatario || 'Mi yo futuro'}</h3>
                    <p>${c.contenido.substring(0,70)}${c.contenido.length>70?'…':''}</p>
                </div>`).join('');
        }

        // ===== FUNCIONES DE VISUALIZACIÓN (SOLO LECTURA) =====
        function verEntrada(id) {
            const entrada = entradasDiario.find(e => e.id === id);
            if (!entrada) return;
            elementoEnLectura = { tipo: 'diario', id, datos: entrada };
            mostrarModalLectura(
                entrada.titulo,
                `
                <p><strong>Fecha:</strong> ${entrada.fecha}</p>
                <p><strong>Ánimo:</strong> <span style="font-size:1.8rem;">${entrada.animo || '😊'}</span></p>
                <p><strong>Contenido:</strong></p>
                <p style="white-space: pre-wrap;">${entrada.contenido}</p>
                `
            );
        }
        
        function verSueño(id) {
            const sueño = suenos.find(e => e.id === id);
            if (!sueño) return;
            elementoEnLectura = { tipo: 'sueno', id, datos: sueño };
            mostrarModalLectura(
                sueño.titulo,
                `
                <p><strong>Fecha:</strong> ${sueño.fecha}</p>
                <p><strong>Categoría:</strong> ${sueño.categoria || 'Sin categoría'}</p>
                <p><strong>Descripción:</strong></p>
                <p style="white-space: pre-wrap;">${sueño.descripcion || 'Sin descripción'}</p>
                `
            );
        }
        
        function verMeta(id) {
            const meta = metas.find(e => e.id === id);
            if (!meta) return;
            elementoEnLectura = { tipo: 'meta', id, datos: meta };
            mostrarModalLectura(
                meta.titulo,
                `
                <p><strong>Fecha límite:</strong> ${meta.fechaLimite || 'Sin fecha'}</p>
                <p><strong>Categoría:</strong> ${meta.categoria || 'Sin categoría'}</p>
                <p><strong>Progreso:</strong> ${meta.progreso || 0}%</p>
                `
            );
        }
        
        function verCarta(id) {
            const carta = cartasFuturo.find(e => e.id === id);
            if (!carta) return;
            elementoEnLectura = { tipo: 'carta', id, datos: carta };
            mostrarModalLectura(
                `Para: ${carta.destinatario || 'Mi yo futuro'}`,
                `
                <p><strong>Fecha:</strong> ${carta.fecha}</p>
                <p><strong>Contenido:</strong></p>
                <p style="white-space: pre-wrap;">${carta.contenido}</p>
                `
            );
        }
        
        function mostrarModalLectura(titulo, contenidoHtml) {
            document.getElementById('modalLecturaTitulo').innerHTML = `<i class="fas fa-book-open"></i> ${titulo}`;
            document.getElementById('modalLecturaContenido').innerHTML = contenidoHtml;
            document.getElementById('modalLecturaOverlay').classList.add('active');
        }
        
        function cerrarModalLectura() {
            document.getElementById('modalLecturaOverlay').classList.remove('active');
            elementoEnLectura = null;
        }
        
        function editarDesdeLectura() {
            if (!elementoEnLectura) return;
            cerrarModalLectura();
            
            switch(elementoEnLectura.tipo) {
                case 'diario':
                    abrirModalEdicion('diario', elementoEnLectura.id);
                    break;
                case 'sueno':
                    abrirModalEdicion('sueno', elementoEnLectura.id);
                    break;
                case 'meta':
                    abrirModalEdicion('meta', elementoEnLectura.id);
                    break;
                case 'carta':
                    abrirModalEdicion('carta', elementoEnLectura.id);
                    break;
            }
        }
        
        function eliminarDesdeLectura() {
            if (!elementoEnLectura) return;
            if (!confirm('¿Eliminar este elemento?')) return;
            
            eliminarEntrada(elementoEnLectura.tipo, elementoEnLectura.id);
            cerrarModalLectura();
        }

        // ===== FUNCIONES ELIMINAR =====
        function eliminarEntrada(tipo, id) {
            if (!confirm('¿Eliminar este elemento?')) return;
            switch(tipo) {
                case 'diario': entradasDiario = entradasDiario.filter(e => e.id !== id); break;
                case 'sueno': suenos = suenos.filter(e => e.id !== id); break;
                case 'meta': metas = metas.filter(e => e.id !== id); break;
                case 'carta': cartasFuturo = cartasFuturo.filter(e => e.id !== id); break;
            }
            guardarDatos();
            renderizarTodo();
            mostrarAlerta('exito', 'Eliminado', 'El elemento se ha quitado');
        }

        function eliminarGusto(id) {
            if(confirm('¿Eliminar este momento?')) {
                historialGustos = historialGustos.filter(g => g.id !== id);
                guardarDatos();
                renderizarQuienSoy();
                actualizarResumen();
                mostrarAlerta('exito', 'Momento eliminado');
            }
        }

        function editarGusto(id) {
            const gusto = historialGustos.find(g => g.id === id);
            if (!gusto) return;
            
            // Abrir modal de edición para quiensoy con el id
            abrirModalEdicion('quiensoy', id);
        }
        
        function editarEntrada(id) {
            abrirModalEdicion('diario', id);
        }
        
        function editarSueno(id) {
            abrirModalEdicion('sueno', id);
        }
        
        function editarMeta(id) {
            abrirModalEdicion('meta', id);
        }
        
        function editarCarta(id) {
            abrirModalEdicion('carta', id);
        }
        
        function abrirModalEdicion(tipo, id) {
            abrirModal(tipo, id);
        }

        // ===== MODAL =====
        function abrirModal(tipo, id = null) {
            modalTipo = tipo;
            modalEditandoId = id;
            
            const modal = document.getElementById('modalOverlay');
            const title = document.getElementById('modalTitle');
            const content = document.getElementById('modalContent');
            
            let html = '';
            let datosExistentes = null;
            
            // Si estamos editando, buscar los datos
            if (id) {
                switch(tipo) {
                    case 'diario': datosExistentes = entradasDiario.find(e => e.id === id); break;
                    case 'quiensoy': datosExistentes = historialGustos.find(e => e.id === id); break;
                    case 'sueno': datosExistentes = suenos.find(e => e.id === id); break;
                    case 'meta': datosExistentes = metas.find(e => e.id === id); break;
                    case 'carta': datosExistentes = cartasFuturo.find(e => e.id === id); break;
                }
            }
            
            switch(tipo) {
                case 'diario':
                    title.innerHTML = '<i class="fas fa-book"></i> ' + (id ? 'Editar entrada' : 'Nueva entrada');
                    
                    let emojiOptions = '';
                    EMOJIS_ANIMO.forEach(emoji => {
                        const selected = (datosExistentes && datosExistentes.animo === emoji) ? 'selected' : '';
                        emojiOptions += `<option value="${emoji}" ${selected}>${emoji}</option>`;
                    });
                    
                    html = `
                        <div class="form-group"><label>Fecha</label><input type="date" id="diarioFecha" value="${datosExistentes ? datosExistentes.fecha : new Date().toISOString().split('T')[0]}" required></div>
                        <div class="form-group"><label>Título</label><input type="text" id="diarioTitulo" value="${datosExistentes ? datosExistentes.titulo : ''}" required></div>
                        <div class="form-group"><label>Contenido</label><textarea id="diarioContenido" required>${datosExistentes ? datosExistentes.contenido : ''}</textarea></div>
                        <div class="form-group"><label>¿Cómo te sientes?</label>
                            <select id="diarioAnimo" class="selector-animo-select">
                                ${emojiOptions}
                            </select>
                        </div>
                    `;
                    break;
                    
                case 'quiensoy':
                    title.innerHTML = '<i class="fas fa-user"></i> ' + (id ? 'Editar momento' : 'Nuevo momento');
                    html = `
                        <div class="form-group"><label>Fecha</label><input type="date" id="gustoFecha" value="${datosExistentes ? datosExistentes.fecha : new Date().toISOString().split('T')[0]}" required></div>
                        <div class="form-group"><label>Color favorito</label><input type="text" id="gustoColor" value="${datosExistentes ? datosExistentes.colorFavorito || '' : ''}"></div>
                        <div class="form-group"><label>Música favorita</label><input type="text" id="gustoMusica" value="${datosExistentes ? datosExistentes.musicaFavorita || '' : ''}"></div>
                        <div class="form-group"><label>Comida favorita</label><input type="text" id="gustoComida" value="${datosExistentes ? datosExistentes.comidaFavorita || '' : ''}"></div>
                        <div class="form-group"><label>Libro favorito</label><input type="text" id="gustoLibro" value="${datosExistentes ? datosExistentes.libroFavorito || '' : ''}"></div>
                        <div class="form-group"><label>Película favorita</label><input type="text" id="gustoPelicula" value="${datosExistentes ? datosExistentes.peliculaFavorita || '' : ''}"></div>
                        <div class="form-group"><label>Hobby</label><input type="text" id="gustoHobby" value="${datosExistentes ? datosExistentes.hobby || '' : ''}"></div>
                        <div class="form-group"><label>Frase que me identifica</label><input type="text" id="gustoFrase" value="${datosExistentes ? datosExistentes.frase || '' : ''}"></div>
                    `;
                    break;
                    
                case 'sueno':
                    title.innerHTML = '<i class="fas fa-cloud"></i> ' + (id ? 'Editar sueño' : 'Nuevo sueño');
                    html = `
                        <div class="form-group"><label>Fecha</label><input type="date" id="suenoFecha" value="${datosExistentes ? datosExistentes.fecha : new Date().toISOString().split('T')[0]}" required></div>
                        <div class="form-group"><label>Título del sueño</label><input type="text" id="suenoTitulo" value="${datosExistentes ? datosExistentes.titulo : ''}" required></div>
                        <div class="form-group"><label>Descripción</label><textarea id="suenoDescripcion">${datosExistentes ? datosExistentes.descripcion || '' : ''}</textarea></div>
                        <div class="form-group"><label>Categoría</label><input type="text" id="suenoCategoria" value="${datosExistentes ? datosExistentes.categoria || '' : ''}" placeholder="viajes, personal..."></div>
                    `;
                    break;
                    
                case 'meta':
                    title.innerHTML = '<i class="fas fa-bullseye"></i> ' + (id ? 'Editar meta' : 'Nueva meta');
                    html = `
                        <div class="form-group"><label>Meta</label><input type="text" id="metaTitulo" value="${datosExistentes ? datosExistentes.titulo : ''}" required></div>
                        <div class="form-group"><label>Categoría</label><input type="text" id="metaCategoria" value="${datosExistentes ? datosExistentes.categoria || '' : ''}"></div>
                        <div class="form-group"><label>Progreso (%)</label><input type="number" id="metaProgreso" min="0" max="100" value="${datosExistentes ? datosExistentes.progreso || 0 : 0}"></div>
                        <div class="form-group"><label>Fecha límite</label><input type="date" id="metaFechaLimite" value="${datosExistentes ? datosExistentes.fechaLimite || '' : ''}"></div>
                    `;
                    break;
                    
                case 'carta':
                    title.innerHTML = '<i class="fas fa-envelope"></i> ' + (id ? 'Editar carta' : 'Nueva carta al futuro');
                    html = `
                        <div class="form-group"><label>Fecha</label><input type="date" id="cartaFecha" value="${datosExistentes ? datosExistentes.fecha : new Date().toISOString().split('T')[0]}" required></div>
                        <div class="form-group"><label>Para (destinatario)</label><input type="text" id="cartaDestinatario" value="${datosExistentes ? datosExistentes.destinatario || 'Mi yo del futuro' : 'Mi yo del futuro'}"></div>
                        <div class="form-group"><label>Contenido de la carta</label><textarea id="cartaContenido" rows="6" required>${datosExistentes ? datosExistentes.contenido || '' : ''}</textarea></div>
                    `;
                    break;
            }
            
            content.innerHTML = html;
            modal.classList.add('active');
            
            document.getElementById('modalForm').onsubmit = function(e) {
                e.preventDefault();
                guardarModal();
            };
        }

        function guardarModal() {
            let nuevoItem = { id: modalEditandoId || Date.now() };
            
            // Si estamos editando, eliminar el anterior
            if (modalEditandoId) {
                switch(modalTipo) {
                    case 'diario': entradasDiario = entradasDiario.filter(e => e.id !== modalEditandoId); break;
                    case 'quiensoy': historialGustos = historialGustos.filter(e => e.id !== modalEditandoId); break;
                    case 'sueno': suenos = suenos.filter(e => e.id !== modalEditandoId); break;
                    case 'meta': metas = metas.filter(e => e.id !== modalEditandoId); break;
                    case 'carta': cartasFuturo = cartasFuturo.filter(e => e.id !== modalEditandoId); break;
                }
            }
            
            switch(modalTipo) {
                case 'diario':
                    nuevoItem.fecha = document.getElementById('diarioFecha').value;
                    nuevoItem.titulo = document.getElementById('diarioTitulo').value;
                    nuevoItem.contenido = document.getElementById('diarioContenido').value;
                    nuevoItem.animo = document.getElementById('diarioAnimo').value;
                    entradasDiario.push(nuevoItem);
                    mostrarAlerta('exito', 'Entrada guardada', 'Tu diario se ha actualizado');
                    break;
                    
                case 'quiensoy':
                    nuevoItem.fecha = document.getElementById('gustoFecha').value;
                    nuevoItem.colorFavorito = document.getElementById('gustoColor').value;
                    nuevoItem.musicaFavorita = document.getElementById('gustoMusica').value;
                    nuevoItem.comidaFavorita = document.getElementById('gustoComida').value;
                    nuevoItem.libroFavorito = document.getElementById('gustoLibro').value;
                    nuevoItem.peliculaFavorita = document.getElementById('gustoPelicula').value;
                    nuevoItem.hobby = document.getElementById('gustoHobby').value;
                    nuevoItem.frase = document.getElementById('gustoFrase').value;
                    historialGustos.push(nuevoItem);
                    mostrarAlerta('exito', 'Momento guardado', 'Tu historia personal crece');
                    break;
                    
                case 'sueno':
                    nuevoItem.fecha = document.getElementById('suenoFecha').value;
                    nuevoItem.titulo = document.getElementById('suenoTitulo').value;
                    nuevoItem.descripcion = document.getElementById('suenoDescripcion').value;
                    nuevoItem.categoria = document.getElementById('suenoCategoria').value;
                    suenos.push(nuevoItem);
                    mostrarAlerta('exito', 'Sueño agregado', 'A seguir soñando ✨');
                    break;
                    
                case 'meta':
                    nuevoItem.titulo = document.getElementById('metaTitulo').value;
                    nuevoItem.categoria = document.getElementById('metaCategoria').value;
                    nuevoItem.progreso = document.getElementById('metaProgreso').value;
                    nuevoItem.fechaLimite = document.getElementById('metaFechaLimite').value;
                    metas.push(nuevoItem);
                    mostrarAlerta('exito', 'Meta agregada', '¡A cumplirla!');
                    break;
                    
                case 'carta':
                    nuevoItem.fecha = document.getElementById('cartaFecha').value;
                    nuevoItem.destinatario = document.getElementById('cartaDestinatario').value;
                    nuevoItem.contenido = document.getElementById('cartaContenido').value;
                    cartasFuturo.push(nuevoItem);
                    mostrarAlerta('exito', 'Carta guardada', 'Llegará a su destino ⏳');
                    break;
            }
            
            guardarDatos();
            renderizarTodo();
            cerrarModal();
        }

        function cerrarModal() {
            document.getElementById('modalOverlay').classList.remove('active');
            modalTipo = null;
            modalEditandoId = null;
        }

        // Exponer funciones globalmente
        window.cambiarFraseAleatoria = cambiarFraseAleatoria;
        window.cambiarFotoPerfil = cambiarFotoPerfil;
        window.abrirModal = abrirModal;
        window.cerrarModal = cerrarModal;
        window.eliminarEntrada = eliminarEntrada;
        window.editarGusto = editarGusto;
        window.eliminarGusto = eliminarGusto;
        window.cerrarAlerta = cerrarAlerta;
        window.verEntrada = verEntrada;
        window.verSueño = verSueño;
        window.verMeta = verMeta;
        window.verCarta = verCarta;
        window.cerrarModalLectura = cerrarModalLectura;
        window.editarDesdeLectura = editarDesdeLectura;
        window.eliminarDesdeLectura = eliminarDesdeLectura;
        window.editarEntrada = editarEntrada;
        window.editarSueno = editarSueno;
        window.editarMeta = editarMeta;
        window.editarCarta = editarCarta;
        window.abrirModalEdicion = abrirModalEdicion;
    </script>
</body>
</html>
