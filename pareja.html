<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Pareja - Diario y Recuerdos</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ===== VARIABLES DE COLORES - TONOS ROMÁNTICOS ===== */
        :root {
            --romantico: #FFB6C1;
            --romantico-oscuro: #FF69B4;
            --atardecer: #FFA07A;
            --amor: #FF4D6D;
            --suave: #FFE4E1;
            --celestial: #87CEEB;
            --fe: #FFD700;
            
            --bg-primary: #FFFFFF;
            --bg-secondary: #FFF0F5;
            --bg-light: #FFFAFA;
            
            --text-primary: #4A4A4A;
            --text-secondary: #7A7A7A;
            --text-light: #FFFFFF;
            
            --shadow: rgba(255, 182, 193, 0.2);
            --shadow-dark: rgba(255, 105, 180, 0.3);
            
            --estado-feliz: #4CAF50;
            --estado-amor: #FF4D6D;
            --estado-triste: #6495ED;
            --estado-estres: #FFA500;
            --estado-romantico: #FF69B4;
        }

        /* ===== ESTILOS GENERALES ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, var(--suave) 0%, var(--romantico) 100%);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* ===== HEADER PRINCIPAL ===== */
        .main-header {
            background: linear-gradient(135deg, var(--amor) 0%, var(--romantico-oscuro) 100%);
            color: var(--text-light);
            padding: 30px;
            border-radius: 30px 30px 30px 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 25px var(--shadow-dark);
            position: relative;
            overflow: hidden;
        }

        .main-header::before {
            content: '❤️';
            position: absolute;
            right: -20px;
            top: -20px;
            font-size: 150px;
            opacity: 0.1;
            transform: rotate(20deg);
        }

        .main-header h1 {
            font-size: 2.8rem;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .main-header h1 i {
            color: var(--fe);
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.2));
        }

        .main-header p {
            font-size: 1.2rem;
            opacity: 0.9;
            max-width: 600px;
        }

        .contador-tiempo {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            border-radius: 50px;
            display: inline-block;
            margin-top: 20px;
            border: 2px solid white;
        }

        .contador-tiempo span {
            font-size: 1.3rem;
            font-weight: bold;
            margin: 0 5px;
        }

        /* ===== TARJETAS DE RESUMEN ===== */
        .resumen-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 25px;
        }

        .card {
            background: var(--bg-primary);
            border-radius: 25px;
            padding: 25px;
            box-shadow: 0 8px 20px var(--shadow);
            border: 2px solid rgba(255, 182, 193, 0.3);
            transition: all 0.4s ease;
            backdrop-filter: blur(5px);
        }

        .card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 15px 35px var(--shadow-dark);
            border-color: var(--romantico-oscuro);
        }

        .card h3 {
            font-size: 1.1rem;
            color: var(--text-secondary);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card .valor {
            font-size: 2.2rem;
            font-weight: bold;
            color: var(--amor);
            margin-bottom: 5px;
        }

        /* ===== NAVEGACIÓN DE PESTAÑAS ===== */
        .tabs-nav {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .tab-btn {
            padding: 18px 35px;
            background: var(--bg-primary);
            border: 2px solid var(--amor);
            color: var(--amor);
            border-radius: 60px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.1rem;
            box-shadow: 0 5px 15px var(--shadow);
        }

        .tab-btn:hover {
            background: var(--amor);
            color: var(--text-light);
            transform: translateY(-3px);
            box-shadow: 0 10px 25px var(--shadow-dark);
        }

        .tab-btn.active {
            background: var(--amor);
            color: var(--text-light);
            box-shadow: 0 5px 20px rgba(255, 77, 109, 0.4);
        }

        /* ===== SECCIONES ===== */
        .tab-section {
            display: none;
            animation: fadeIn 0.5s ease-out;
        }

        .tab-section.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== DIARIO DE PAREJA ===== */
        .diario-section {
            background: var(--bg-primary);
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 8px 20px var(--shadow);
            border: 2px solid rgba(255, 182, 193, 0.3);
        }

        .diario-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .diario-filtros {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .filtro-btn {
            padding: 10px 20px;
            border: 2px solid var(--romantico);
            background: transparent;
            color: var(--romantico-oscuro);
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .filtro-btn:hover,
        .filtro-btn.active {
            background: var(--romantico);
            color: white;
        }

        .diario-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
        }

        .entrada-diario {
            background: linear-gradient(135deg, var(--bg-light), white);
            border-radius: 25px;
            padding: 25px;
            box-shadow: 0 5px 15px var(--shadow);
            border: 2px solid rgba(255, 182, 193, 0.2);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .entrada-diario:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px var(--shadow-dark);
            border-color: var(--romantico);
        }

        .entrada-diario::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: linear-gradient(90deg, var(--amor), var(--romantico-oscuro), var(--fe));
        }

        .entrada-fecha {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .entrada-fecha i {
            color: var(--amor);
        }

        .entrada-estado {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .estado-feliz {
            background: rgba(76, 175, 80, 0.1);
            color: var(--estado-feliz);
            border: 1px solid var(--estado-feliz);
        }

        .estado-amor {
            background: rgba(255, 77, 109, 0.1);
            color: var(--estado-amor);
            border: 1px solid var(--estado-amor);
        }

        .estado-romantico {
            background: rgba(255, 105, 180, 0.1);
            color: var(--estado-romantico);
            border: 1px solid var(--estado-romantico);
        }

        .estado-triste {
            background: rgba(100, 149, 237, 0.1);
            color: var(--estado-triste);
            border: 1px solid var(--estado-triste);
        }

        .estado-estres {
            background: rgba(255, 165, 0, 0.1);
            color: var(--estado-estres);
            border: 1px solid var(--estado-estres);
        }

        .entrada-titulo {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 10px;
            color: var(--text-primary);
        }

        .entrada-contenido {
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 20px;
            max-height: 150px;
            overflow-y: auto;
            padding-right: 10px;
        }

        .entrada-contenido::-webkit-scrollbar {
            width: 5px;
        }

        .entrada-contenido::-webkit-scrollbar-thumb {
            background: var(--romantico);
            border-radius: 5px;
        }

        .entrada-acciones {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            border-top: 1px dashed rgba(255, 182, 193, 0.3);
            padding-top: 15px;
        }

        .btn-icono {
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 8px 15px;
            border-radius: 20px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 5px;
            color: var(--text-secondary);
        }

        .btn-icono:hover {
            background: rgba(255, 182, 193, 0.2);
            color: var(--amor);
        }

        .btn-icono.eliminar:hover {
            background: rgba(255, 77, 77, 0.1);
            color: #ff4d4d;
        }

        /* ===== ÁLBUM DE FOTOS ===== */
        .album-section {
            background: var(--bg-primary);
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 8px 20px var(--shadow);
            border: 2px solid rgba(255, 182, 193, 0.3);
        }

        .album-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .album-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .foto-card {
            background: white;
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 5px 15px var(--shadow);
            transition: all 0.3s;
            border: 2px solid rgba(255, 182, 193, 0.2);
        }

        .foto-card:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 15px 30px var(--shadow-dark);
            border-color: var(--romantico);
        }

        .foto-imagen {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-bottom: 3px solid var(--romantico);
        }

        .foto-info {
            padding: 20px;
        }

        .foto-fecha {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .foto-descripcion {
            font-size: 1rem;
            color: var(--text-primary);
            margin-bottom: 15px;
            line-height: 1.4;
        }

        .foto-acciones {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        /* ===== VERSÍCULOS BÍBLICOS ===== */
        .versiculos-section {
            background: var(--bg-primary);
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 8px 20px var(--shadow);
            border: 2px solid rgba(255, 182, 193, 0.3);
        }

        .versiculos-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .versiculo-destacado {
            background: linear-gradient(135deg, var(--fe) 0%, #FFD700 100%);
            color: white;
            padding: 30px;
            border-radius: 25px;
            margin-bottom: 30px;
            text-align: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(255, 215, 0, 0.3);
        }

        .versiculo-destacado::before {
            content: '🙏';
            position: absolute;
            right: -20px;
            bottom: -20px;
            font-size: 120px;
            opacity: 0.1;
        }

        .versiculo-destacado-texto {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 15px;
            font-style: italic;
        }

        .versiculo-destacado-cita {
            font-size: 1.3rem;
            opacity: 0.9;
        }

        .versiculos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        .versiculo-card {
            background: var(--bg-light);
            border-radius: 20px;
            padding: 25px;
            border-left: 5px solid var(--fe);
            transition: all 0.3s;
            box-shadow: 0 5px 15px var(--shadow);
        }

        .versiculo-card:hover {
            transform: translateX(5px);
            box-shadow: 0 10px 25px var(--shadow-dark);
        }

        .versiculo-texto {
            font-size: 1.1rem;
            font-style: italic;
            color: var(--text-primary);
            margin-bottom: 15px;
            line-height: 1.6;
        }

        .versiculo-cita {
            font-size: 1rem;
            color: var(--fe);
            font-weight: 600;
            text-align: right;
            margin-bottom: 10px;
        }

        .versiculo-tema {
            display: inline-block;
            padding: 3px 12px;
            background: rgba(255, 215, 0, 0.1);
            color: #B8860B;
            border-radius: 20px;
            font-size: 0.85rem;
            margin-bottom: 15px;
        }

        /* ===== MODALES ===== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--bg-primary);
            border-radius: 30px;
            width: 100%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
            padding: 30px;
            box-shadow: 0 20px 40px var(--shadow-dark);
            border: 3px solid var(--romantico);
            animation: modalEntrada 0.4s ease-out;
        }

        @keyframes modalEntrada {
            from {
                opacity: 0;
                transform: scale(0.8) translateY(30px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .modal h2 {
            color: var(--amor);
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 1.8rem;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid rgba(255, 182, 193, 0.3);
            border-radius: 15px;
            font-size: 1rem;
            transition: all 0.3s;
            background: var(--bg-light);
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--amor);
            box-shadow: 0 0 0 4px rgba(255, 77, 109, 0.1);
        }

        .form-group input[type="file"] {
            padding: 10px;
            background: var(--bg-light);
        }

        .previsualizacion-foto {
            width: 100%;
            max-height: 200px;
            object-fit: contain;
            margin-top: 10px;
            border-radius: 15px;
            border: 2px solid var(--romantico);
            display: none;
        }

        .modal-actions {
            display: flex;
            gap: 15px;
            justify-content: flex-end;
            margin-top: 30px;
        }

        .btn {
            padding: 15px 30px;
            border-radius: 60px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1rem;
        }

        .btn-primary {
            background: var(--amor);
            color: var(--text-light);
        }

        .btn-primary:hover {
            background: var(--romantico-oscuro);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(255, 77, 109, 0.3);
        }

        .btn-secondary {
            background: transparent;
            color: var(--amor);
            border: 2px solid var(--amor);
        }

        .btn-secondary:hover {
            background: rgba(255, 77, 109, 0.1);
            transform: translateY(-3px);
        }

        .btn-success {
            background: var(--fe);
            color: white;
        }

        .btn-success:hover {
            background: #FFD700;
            transform: translateY(-3px);
        }

        /* ===== BOTONES FLOTANTES ===== */
        .floating-buttons {
            position: fixed;
            bottom: 30px;
            right: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 100;
        }

        .floating-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: var(--amor);
            color: white;
            border: none;
            cursor: pointer;
            font-size: 1.5rem;
            box-shadow: 0 5px 20px rgba(255, 77, 109, 0.4);
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .floating-btn:hover {
            transform: scale(1.1) rotate(5deg);
            background: var(--romantico-oscuro);
        }

        .floating-btn:nth-child(2) {
            background: var(--romantico-oscuro);
        }

        .floating-btn:nth-child(3) {
            background: var(--fe);
        }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--suave);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--romantico);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--amor);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            body {
                padding: 15px;
            }

            .main-header h1 {
                font-size: 2rem;
            }

            .diario-grid,
            .album-grid,
            .versiculos-grid {
                grid-template-columns: 1fr;
            }

            .tab-btn {
                width: 100%;
                justify-content: center;
            }

            .floating-buttons {
                bottom: 20px;
                right: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header principal -->
        <header class="main-header">
            <h1>
                <i class="fas fa-heart"></i>
                Nuestro Amor
            </h1>
            <p>Guarda tus recuerdos, pensamientos y versículos especiales</p>
            
            <!-- Contador de tiempo juntos -->
            <div class="contador-tiempo" id="contadorTiempo">
                <i class="fas fa-clock"></i>
                <span id="diasJuntos">0</span> días juntos ❤️
            </div>

            <!-- Tarjetas de resumen -->
            <div class="resumen-cards">
                <div class="card">
                    <h3><i class="fas fa-book-open"></i> Entradas</h3>
                    <div class="valor" id="totalEntradas">0</div>
                </div>
                <div class="card">
                    <h3><i class="fas fa-images"></i> Fotos</h3>
                    <div class="valor" id="totalFotos">0</div>
                </div>
                <div class="card">
                    <h3><i class="fas fa-bible"></i> Versículos</h3>
                    <div class="valor" id="totalVersiculos">0</div>
                </div>
            </div>
        </header>

        <!-- Navegación de pestañas -->
        <div class="tabs-nav">
            <button class="tab-btn active" data-tab="diario">
                <i class="fas fa-book-open"></i> Diario
            </button>
            <button class="tab-btn" data-tab="album">
                <i class="fas fa-images"></i> Álbum
            </button>
            <button class="tab-btn" data-tab="versiculos">
                <i class="fas fa-bible"></i> Versículos
            </button>
        </div>

        <!-- SECCIÓN: DIARIO -->
        <section class="tab-section active" id="tab-diario">
            <div class="diario-section">
                <div class="diario-header">
                    <h2><i class="fas fa-heart" style="color: var(--amor);"></i> Nuestro Diario</h2>
                    <div class="diario-filtros">
                        <button class="filtro-btn active" onclick="filtrarDiario('todos')">Todos</button>
                        <button class="filtro-btn" onclick="filtrarDiario('feliz')">😊 Feliz</button>
                        <button class="filtro-btn" onclick="filtrarDiario('amor')">❤️ Amor</button>
                        <button class="filtro-btn" onclick="filtrarDiario('romantico')">💕 Romántico</button>
                    </div>
                </div>

                <div class="diario-grid" id="diarioGrid">
                    <!-- Las entradas se cargan aquí -->
                </div>
            </div>
        </section>

        <!-- SECCIÓN: ÁLBUM -->
        <section class="tab-section" id="tab-album">
            <div class="album-section">
                <div class="album-header">
                    <h2><i class="fas fa-heart" style="color: var(--amor);"></i> Nuestro Álbum de Recuerdos</h2>
                    <button class="btn-primary" onclick="abrirModal('foto')">
                        <i class="fas fa-plus"></i> Subir Foto
                    </button>
                </div>

                <div class="album-grid" id="albumGrid">
                    <!-- Las fotos se cargan aquí -->
                </div>
            </div>
        </section>

        <!-- SECCIÓN: VERSÍCULOS -->
        <section class="tab-section" id="tab-versiculos">
            <div class="versiculos-section">
                <div class="versiculos-header">
                    <h2><i class="fas fa-bible" style="color: var(--fe);"></i> Versículos para Nuestro Amor</h2>
                    <button class="btn-success" onclick="abrirModal('versiculo')">
                        <i class="fas fa-plus"></i> Agregar Versículo
                    </button>
                </div>

                <!-- Versículo destacado aleatorio -->
                <div class="versiculo-destacado" id="versiculoDestacado">
                    <div class="versiculo-destacado-texto">"El amor es paciente, es bondadoso..."</div>
                    <div class="versiculo-destacado-cita">1 Corintios 13:4</div>
                </div>

                <div class="versiculos-grid" id="versiculosGrid">
                    <!-- Los versículos se cargan aquí -->
                </div>
            </div>
        </section>
    </div>

    <!-- Botones flotantes -->
    <div class="floating-buttons">
        <button class="floating-btn" onclick="abrirModal('diario')">
            <i class="fas fa-pen"></i>
        </button>
        <button class="floating-btn" onclick="abrirModal('foto')">
            <i class="fas fa-camera"></i>
        </button>
        <button class="floating-btn" onclick="abrirModal('versiculo')">
            <i class="fas fa-bible"></i>
        </button>
    </div>

    <!-- MODAL PARA AGREGAR/EDITAR -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h2 id="modalTitle"><i class="fas fa-plus-circle"></i> Nuevo</h2>
            <form id="modalForm">
                <div id="modalContent">
                    <!-- Contenido dinámico -->
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" onclick="cerrarModal()">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // ===== ESTRUCTURA DE DATOS =====
        let entradasDiario = JSON.parse(localStorage.getItem('entradasDiario')) || [];
        let fotosAlbum = JSON.parse(localStorage.getItem('fotosAlbum')) || [];
        let versiculos = JSON.parse(localStorage.getItem('versiculos')) || [];
        
        // Fecha de inicio de la relación (cambiar según tu fecha)
        const fechaInicio = new Date('2024-01-01'); // Cambia esta fecha
        
        let modalTipo = null;
        let modalEditandoId = null;
        let filtroActual = 'todos';

        // Versículos predefinidos para ejemplo
        const versiculosPredeterminados = [
            {
                id: 1,
                texto: "El amor es paciente, es bondadoso. El amor no es envidioso ni jactancioso ni orgulloso.",
                cita: "1 Corintios 13:4",
                tema: "Amor"
            },
            {
                id: 2,
                texto: "Sobre todo, vístanse de amor, que es el vínculo perfecto.",
                cita: "Colosenses 3:14",
                tema: "Unión"
            },
            {
                id: 3,
                texto: "Por eso dejará el hombre a su padre y a su madre, y se unirá a su esposa, y los dos llegarán a ser un solo cuerpo.",
                cita: "Efesios 5:31",
                tema: "Matrimonio"
            },
            {
                id: 4,
                texto: "Que el Señor te bendiga y te guarde; que el Señor te mire con agrado y te extienda su amor.",
                cita: "Números 6:24-26",
                tema: "Bendición"
            },
            {
                id: 5,
                texto: "Dos son mejor que uno, porque obtienen más fruto de su esfuerzo. Si caen, el uno levanta al otro.",
                cita: "Eclesiastés 4:9-10",
                tema: "Compañerismo"
            }
        ];

        // ===== INICIALIZACIÓN =====
        document.addEventListener('DOMContentLoaded', function() {
            cargarDatosEjemplo();
            actualizarContadorTiempo();
            renderizarDiario();
            renderizarAlbum();
            renderizarVersiculos();
            actualizarResumen();
            configurarTabs();
            actualizarVersiculoDestacado();
            
            // Actualizar contador cada día
            setInterval(actualizarContadorTiempo, 86400000);
        });

        function cargarDatosEjemplo() {
            if (entradasDiario.length === 0) {
                entradasDiario = [
                    {
                        id: Date.now() - 86400000 * 5,
                        fecha: new Date(Date.now() - 86400000 * 5).toISOString().split('T')[0],
                        titulo: "Nuestra primera cita",
                        contenido: "Hoy fue un día especial...",
                        estado: "feliz"
                    },
                    {
                        id: Date.now() - 86400000 * 3,
                        fecha: new Date(Date.now() - 86400000 * 3).toISOString().split('T')[0],
                        titulo: "Te amo",
                        contenido: "Cada día me enamoro más de ti...",
                        estado: "amor"
                    }
                ];
            }

            if (fotosAlbum.length === 0) {
                // No podemos guardar fotos reales en localStorage, usamos placeholders
                fotosAlbum = [
                    {
                        id: 1,
                        fecha: new Date().toISOString().split('T')[0],
                        descripcion: "Nuestro primer atardecer",
                        imagen: "https://via.placeholder.com/400x300/FFB6C1/FFFFFF?text=❤️+Atardecer",
                        lugar: "Playa"
                    },
                    {
                        id: 2,
                        fecha: new Date().toISOString().split('T')[0],
                        descripcion: "Cena romántica",
                        imagen: "https://via.placeholder.com/400x300/FF69B4/FFFFFF?text=❤️+Cena",
                        lugar: "Restaurante"
                    }
                ];
            }

            if (versiculos.length === 0) {
                versiculos = versiculosPredeterminados;
            }

            guardarDatos();
        }

        function guardarDatos() {
            localStorage.setItem('entradasDiario', JSON.stringify(entradasDiario));
            localStorage.setItem('fotosAlbum', JSON.stringify(fotosAlbum));
            localStorage.setItem('versiculos', JSON.stringify(versiculos));
        }

        function configurarTabs() {
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const tab = this.dataset.tab;
                    
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    document.querySelectorAll('.tab-section').forEach(s => s.classList.remove('active'));
                    
                    this.classList.add('active');
                    document.getElementById(`tab-${tab}`).classList.add('active');
                });
            });
        }

        function actualizarContadorTiempo() {
            const hoy = new Date();
            const diffTiempo = hoy - fechaInicio;
            const diffDias = Math.floor(diffTiempo / (1000 * 60 * 60 * 24));
            
            document.getElementById('diasJuntos').textContent = diffDias;
        }

        function actualizarResumen() {
            document.getElementById('totalEntradas').textContent = entradasDiario.length;
            document.getElementById('totalFotos').textContent = fotosAlbum.length;
            document.getElementById('totalVersiculos').textContent = versiculos.length;
        }

        // ===== FUNCIONES DEL DIARIO =====
        function renderizarDiario() {
            const grid = document.getElementById('diarioGrid');
            
            const entradasFiltradas = filtroActual === 'todos' 
                ? entradasDiario 
                : entradasDiario.filter(e => e.estado === filtroActual);
            
            if (entradasFiltradas.length === 0) {
                grid.innerHTML = `
                    <div style="grid-column:1/-1; text-align:center; padding:60px;">
                        <i class="fas fa-book-open" style="font-size:4rem; color:var(--romantico); opacity:0.3;"></i>
                        <h3 style="margin-top:20px;">No hay entradas</h3>
                        <p>Comienza a escribir tu diario de pareja</p>
                    </div>
                `;
                return;
            }
            
            grid.innerHTML = entradasFiltradas.sort((a,b) => new Date(b.fecha) - new Date(a.fecha)).map(entrada => `
                <div class="entrada-diario">
                    <div class="entrada-fecha">
                        <span><i class="far fa-calendar"></i> ${new Date(entrada.fecha).toLocaleDateString('es-ES', { year: 'numeric', month: 'long', day: 'numeric' })}</span>
                        <span><i class="far fa-clock"></i> ${new Date(entrada.fecha + 'T12:00:00').toLocaleDateString('es-ES', { weekday: 'long' })}</span>
                    </div>
                    <span class="entrada-estado estado-${entrada.estado}">
                        ${entrada.estado === 'feliz' ? '😊 Feliz' : 
                          entrada.estado === 'amor' ? '❤️ Amor' : 
                          entrada.estado === 'romantico' ? '💕 Romántico' : 
                          entrada.estado === 'triste' ? '😢 Triste' : '😓 Estresado'}
                    </span>
                    <div class="entrada-titulo">${entrada.titulo}</div>
                    <div class="entrada-contenido">${entrada.contenido.replace(/\n/g, '<br>')}</div>
                    <div class="entrada-acciones">
                        <button class="btn-icono" onclick="editarEntrada(${entrada.id})">
                            <i class="fas fa-edit"></i> Editar
                        </button>
                        <button class="btn-icono eliminar" onclick="eliminarEntrada(${entrada.id})">
                            <i class="fas fa-trash"></i> Eliminar
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function filtrarDiario(filtro) {
            filtroActual = filtro;
            
            document.querySelectorAll('.filtro-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            renderizarDiario();
        }

        // ===== FUNCIONES DEL ÁLBUM =====
        function renderizarAlbum() {
            const grid = document.getElementById('albumGrid');
            
            if (fotosAlbum.length === 0) {
                grid.innerHTML = `
                    <div style="grid-column:1/-1; text-align:center; padding:60px;">
                        <i class="fas fa-images" style="font-size:4rem; color:var(--romantico); opacity:0.3;"></i>
                        <h3 style="margin-top:20px;">No hay fotos</h3>
                        <p>Sube tus primeros recuerdos</p>
                    </div>
                `;
                return;
            }
            
            grid.innerHTML = fotosAlbum.sort((a,b) => new Date(b.fecha) - new Date(a.fecha)).map(foto => `
                <div class="foto-card">
                    <img src="${foto.imagen}" class="foto-imagen" alt="${foto.descripcion}">
                    <div class="foto-info">
                        <div class="foto-fecha">
                            <i class="far fa-calendar"></i> ${new Date(foto.fecha).toLocaleDateString('es-ES')}
                            ${foto.lugar ? `<span style="margin-left:10px;"><i class="fas fa-map-marker-alt"></i> ${foto.lugar}</span>` : ''}
                        </div>
                        <div class="foto-descripcion">${foto.descripcion}</div>
                        <div class="foto-acciones">
                            <button class="btn-icono" onclick="editarFoto(${foto.id})">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button class="btn-icono eliminar" onclick="eliminarFoto(${foto.id})">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // ===== FUNCIONES DE VERSÍCULOS =====
        function renderizarVersiculos() {
            const grid = document.getElementById('versiculosGrid');
            
            grid.innerHTML = versiculos.map(v => `
                <div class="versiculo-card">
                    <div class="versiculo-texto">"${v.texto}"</div>
                    <div class="versiculo-cita">— ${v.cita}</div>
                    ${v.tema ? `<span class="versiculo-tema">${v.tema}</span>` : ''}
                    <div class="entrada-acciones" style="margin-top:15px;">
                        <button class="btn-icono" onclick="editarVersiculo(${v.id})">
                            <i class="fas fa-edit"></i> Editar
                        </button>
                        <button class="btn-icono eliminar" onclick="eliminarVersiculo(${v.id})">
                            <i class="fas fa-trash"></i> Eliminar
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function actualizarVersiculoDestacado() {
            if (versiculos.length > 0) {
                const random = Math.floor(Math.random() * versiculos.length);
                const v = versiculos[random];
                document.getElementById('versiculoDestacado').innerHTML = `
                    <div class="versiculo-destacado-texto">"${v.texto}"</div>
                    <div class="versiculo-destacado-cita">${v.cita}</div>
                `;
            }
        }

        // ===== FUNCIONES DE MODALES =====
        function abrirModal(tipo) {
            modalTipo = tipo;
            modalEditandoId = null;
            
            const modal = document.getElementById('modalOverlay');
            const title = document.getElementById('modalTitle');
            const content = document.getElementById('modalContent');
            
            switch(tipo) {
                case 'diario':
                    title.innerHTML = '<i class="fas fa-pen"></i> Nueva Entrada';
                    content.innerHTML = `
                        <div class="form-group">
                            <label><i class="fas fa-calendar"></i> Fecha</label>
                            <input type="date" id="entradaFecha" value="${new Date().toISOString().split('T')[0]}" required>
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-smile"></i> Estado de ánimo</label>
                            <select id="entradaEstado" required>
                                <option value="feliz">😊 Feliz</option>
                                <option value="amor">❤️ Enamorado</option>
                                <option value="romantico">💕 Romántico</option>
                                <option value="triste">😢 Triste</option>
                                <option value="estres">😓 Estresado</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-heading"></i> Título</label>
                            <input type="text" id="entradaTitulo" required placeholder="Ej: Nuestro día especial">
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-align-left"></i> Contenido</label>
                            <textarea id="entradaContenido" rows="5" required placeholder="Escribe tus pensamientos..."></textarea>
                        </div>
                    `;
                    break;
                    
                case 'foto':
                    title.innerHTML = '<i class="fas fa-camera"></i> Subir Foto';
                    content.innerHTML = `
                        <div class="form-group">
                            <label><i class="fas fa-image"></i> Seleccionar imagen</label>
                            <input type="file" id="fotoArchivo" accept="image/*" required onchange="previsualizarFoto()">
                            <img id="fotoPrevisualizacion" class="previsualizacion-foto" src="#" alt="Previsualización">
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-calendar"></i> Fecha</label>
                            <input type="date" id="fotoFecha" value="${new Date().toISOString().split('T')[0]}" required>
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-map-marker-alt"></i> Lugar (opcional)</label>
                            <input type="text" id="fotoLugar" placeholder="Ej: Playa, restaurante...">
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-align-left"></i> Descripción</label>
                            <textarea id="fotoDescripcion" rows="3" required placeholder="Describe este momento..."></textarea>
                        </div>
                        <p style="color: #999; font-size:0.85rem;">
                            <i class="fas fa-info-circle"></i> Las imágenes se guardan en tu dispositivo (localStorage)
                        </p>
                    `;
                    break;
                    
                case 'versiculo':
                    title.innerHTML = '<i class="fas fa-bible"></i> Agregar Versículo';
                    content.innerHTML = `
                        <div class="form-group">
                            <label><i class="fas fa-quote-right"></i> Texto del versículo</label>
                            <textarea id="versiculoTexto" rows="3" required placeholder="Escribe el versículo..."></textarea>
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-bookmark"></i> Cita</label>
                            <input type="text" id="versiculoCita" required placeholder="Ej: 1 Corintios 13:4">
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-tag"></i> Tema (opcional)</label>
                            <input type="text" id="versiculoTema" placeholder="Ej: Amor, Paciencia, Unión">
                        </div>
                    `;
                    break;
            }
            
            modal.classList.add('active');
            
            document.getElementById('modalForm').onsubmit = function(e) {
                e.preventDefault();
                guardarModal();
            };
        }

        function previsualizarFoto() {
            const input = document.getElementById('fotoArchivo');
            const preview = document.getElementById('fotoPrevisualizacion');
            
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                
                reader.onload = function(e) {
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                };
                
                reader.readAsDataURL(input.files[0]);
            }
        }

        function guardarModal() {
            switch(modalTipo) {
                case 'diario':
                    const nuevaEntrada = {
                        id: modalEditandoId || Date.now(),
                        fecha: document.getElementById('entradaFecha').value,
                        titulo: document.getElementById('entradaTitulo').value,
                        contenido: document.getElementById('entradaContenido').value,
                        estado: document.getElementById('entradaEstado').value
                    };
                    
                    if (modalEditandoId) {
                        const index = entradasDiario.findIndex(e => e.id === modalEditandoId);
                        if (index !== -1) entradasDiario[index] = nuevaEntrada;
                    } else {
                        entradasDiario.push(nuevaEntrada);
                    }
                    break;
                    
                case 'foto':
                    const inputFile = document.getElementById('fotoArchivo');
                    let imagenData = '';
                    
                    if (inputFile.files && inputFile.files[0]) {
                        const reader = new FileReader();
                        reader.onload = function(e) {
                            imagenData = e.target.result;
                            
                            const nuevaFoto = {
                                id: modalEditandoId || Date.now(),
                                fecha: document.getElementById('fotoFecha').value,
                                descripcion: document.getElementById('fotoDescripcion').value,
                                lugar: document.getElementById('fotoLugar').value,
                                imagen: imagenData
                            };
                            
                            if (modalEditandoId) {
                                const index = fotosAlbum.findIndex(f => f.id === modalEditandoId);
                                if (index !== -1) fotosAlbum[index] = nuevaFoto;
                            } else {
                                fotosAlbum.push(nuevaFoto);
                            }
                            
                            guardarDatos();
                            renderizarAlbum();
                            actualizarResumen();
                            cerrarModal();
                        };
                        reader.readAsDataURL(inputFile.files[0]);
                        return;
                    } else {
                        alert('Por favor selecciona una imagen');
                        return;
                    }
                    break;
                    
                case 'versiculo':
                    const nuevoVersiculo = {
                        id: modalEditandoId || Date.now(),
                        texto: document.getElementById('versiculoTexto').value,
                        cita: document.getElementById('versiculoCita').value,
                        tema: document.getElementById('versiculoTema').value
                    };
                    
                    if (modalEditandoId) {
                        const index = versiculos.findIndex(v => v.id === modalEditandoId);
                        if (index !== -1) versiculos[index] = nuevoVersiculo;
                    } else {
                        versiculos.push(nuevoVersiculo);
                    }
                    
                    actualizarVersiculoDestacado();
                    break;
            }
            
            guardarDatos();
            renderizarDiario();
            renderizarAlbum();
            renderizarVersiculos();
            actualizarResumen();
            cerrarModal();
        }

        function editarEntrada(id) {
            const entrada = entradasDiario.find(e => e.id === id);
            if (!entrada) return;
            
            modalTipo = 'diario';
            modalEditandoId = id;
            
            const modal = document.getElementById('modalOverlay');
            document.getElementById('modalTitle').innerHTML = '<i class="fas fa-edit"></i> Editar Entrada';
            
            document.getElementById('modalContent').innerHTML = `
                <div class="form-group">
                    <label><i class="fas fa-calendar"></i> Fecha</label>
                    <input type="date" id="entradaFecha" value="${entrada.fecha}" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-smile"></i> Estado de ánimo</label>
                    <select id="entradaEstado" required>
                        <option value="feliz" ${entrada.estado === 'feliz' ? 'selected' : ''}>😊 Feliz</option>
                        <option value="amor" ${entrada.estado === 'amor' ? 'selected' : ''}>❤️ Enamorado</option>
                        <option value="romantico" ${entrada.estado === 'romantico' ? 'selected' : ''}>💕 Romántico</option>
                        <option value="triste" ${entrada.estado === 'triste' ? 'selected' : ''}>😢 Triste</option>
                        <option value="estres" ${entrada.estado === 'estres' ? 'selected' : ''}>😓 Estresado</option>
                    </select>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-heading"></i> Título</label>
                    <input type="text" id="entradaTitulo" value="${entrada.titulo}" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-align-left"></i> Contenido</label>
                    <textarea id="entradaContenido" rows="5" required>${entrada.contenido}</textarea>
                </div>
            `;
            
            modal.classList.add('active');
            
            document.getElementById('modalForm').onsubmit = function(e) {
                e.preventDefault();
                guardarModal();
            };
        }

        function eliminarEntrada(id) {
            if (confirm('¿Eliminar esta entrada?')) {
                entradasDiario = entradasDiario.filter(e => e.id !== id);
                guardarDatos();
                renderizarDiario();
                actualizarResumen();
            }
        }

        function editarFoto(id) {
            const foto = fotosAlbum.find(f => f.id === id);
            if (!foto) return;
            
            modalTipo = 'foto';
            modalEditandoId = id;
            
            const modal = document.getElementById('modalOverlay');
            document.getElementById('modalTitle').innerHTML = '<i class="fas fa-edit"></i> Editar Foto';
            
            document.getElementById('modalContent').innerHTML = `
                <div class="form-group">
                    <label><i class="fas fa-image"></i> Imagen actual</label>
                    <img src="${foto.imagen}" style="width:100%; border-radius:15px; margin-bottom:10px;">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-calendar"></i> Fecha</label>
                    <input type="date" id="fotoFecha" value="${foto.fecha}" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-map-marker-alt"></i> Lugar (opcional)</label>
                    <input type="text" id="fotoLugar" value="${foto.lugar || ''}">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-align-left"></i> Descripción</label>
                    <textarea id="fotoDescripcion" rows="3" required>${foto.descripcion}</textarea>
                </div>
            `;
            
            modal.classList.add('active');
            
            document.getElementById('modalForm').onsubmit = function(e) {
                e.preventDefault();
                
                const fotoEditada = {
                    ...foto,
                    fecha: document.getElementById('fotoFecha').value,
                    lugar: document.getElementById('fotoLugar').value,
                    descripcion: document.getElementById('fotoDescripcion').value
                };
                
                const index = fotosAlbum.findIndex(f => f.id === id);
                if (index !== -1) fotosAlbum[index] = fotoEditada;
                
                guardarDatos();
                renderizarAlbum();
                actualizarResumen();
                cerrarModal();
            };
        }

        function eliminarFoto(id) {
            if (confirm('¿Eliminar esta foto?')) {
                fotosAlbum = fotosAlbum.filter(f => f.id !== id);
                guardarDatos();
                renderizarAlbum();
                actualizarResumen();
            }
        }

        function editarVersiculo(id) {
            const versiculo = versiculos.find(v => v.id === id);
            if (!versiculo) return;
            
            modalTipo = 'versiculo';
            modalEditandoId = id;
            
            const modal = document.getElementById('modalOverlay');
            document.getElementById('modalTitle').innerHTML = '<i class="fas fa-edit"></i> Editar Versículo';
            
            document.getElementById('modalContent').innerHTML = `
                <div class="form-group">
                    <label><i class="fas fa-quote-right"></i> Texto del versículo</label>
                    <textarea id="versiculoTexto" rows="3" required>${versiculo.texto}</textarea>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-bookmark"></i> Cita</label>
                    <input type="text" id="versiculoCita" value="${versiculo.cita}" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-tag"></i> Tema (opcional)</label>
                    <input type="text" id="versiculoTema" value="${versiculo.tema || ''}">
                </div>
            `;
            
            modal.classList.add('active');
            
            document.getElementById('modalForm').onsubmit = function(e) {
                e.preventDefault();
                guardarModal();
            };
        }

        function eliminarVersiculo(id) {
            if (confirm('¿Eliminar este versículo?')) {
                versiculos = versiculos.filter(v => v.id !== id);
                guardarDatos();
                renderizarVersiculos();
                actualizarVersiculoDestacado();
                actualizarResumen();
            }
        }

        function cerrarModal() {
            document.getElementById('modalOverlay').classList.remove('active');
            modalTipo = null;
            modalEditandoId = null;
        }
    </script>
</body>
</html>
