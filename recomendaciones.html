<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recomendaciones - Mi Organizador</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            background: white;
            border-radius: 15px;
            padding: 25px 30px;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .header h1 {
            font-size: 1.8rem;
            color: #333;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header h1 i {
            color: #667eea;
        }

        .stats-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 25px;
            border-radius: 12px;
            text-align: center;
            min-width: 120px;
        }

        .stat-card .stat-number {
            font-size: 1.8rem;
            font-weight: bold;
        }

        .stat-card .stat-label {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        /* ===== FORMULARIO DESPLEGABLE ===== */
        .form-dropdown-section {
            background: white;
            border-radius: 15px;
            margin-bottom: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .form-dropdown-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 18px 25px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s;
        }

        .form-dropdown-header:hover {
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
        }

        .form-dropdown-header h2 {
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-dropdown-header h2 i {
            font-size: 1.3rem;
        }

        .dropdown-icon {
            width: 36px;
            height: 36px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s;
        }

        .dropdown-icon.open {
            transform: rotate(180deg);
        }

        .form-dropdown-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s ease-out;
            background: white;
        }

        .form-dropdown-content.open {
            max-height: 1000px;
            transition: max-height 0.5s ease-in;
        }

        .form-container {
            padding: 25px 30px;
        }

        /* Filtros */
        .filters-section {
            background: white;
            border-radius: 15px;
            padding: 20px 25px;
            margin-bottom: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .filters-title {
            font-size: 1.1rem;
            color: #555;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filter-badges {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 15px;
        }

        .filter-badge {
            padding: 8px 16px;
            border-radius: 50px;
            background: #f0f0f0;
            color: #555;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .filter-badge:hover {
            background: #e0e0e0;
            transform: translateY(-2px);
        }

        .filter-badge.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .filter-badge.active i {
            color: white;
        }

        .filter-badge i {
            font-size: 1rem;
            color: #667eea;
        }

        .view-options {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #eee;
        }

        .view-btn {
            padding: 8px 16px;
            border-radius: 8px;
            background: white;
            border: 1px solid #ddd;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
            color: #555;
        }

        .view-btn:hover {
            background: #f5f5f5;
        }

        .view-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        /* Formulario */
        .form-title {
            font-size: 1.2rem;
            color: #333;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .form-control {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 0.95rem;
            transition: all 0.3s;
        }

        .form-control:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        textarea.form-control {
            min-height: 100px;
            resize: vertical;
        }

        .btn {
            padding: 12px 25px;
            border-radius: 10px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.95rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #555;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
            transform: translateY(-2px);
        }

        .btn-success {
            background: #4CAF50;
            color: white;
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(76, 175, 80, 0.4);
        }

        /* Grid de recomendaciones */
        .recomendaciones-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
        }

        .recomendacion-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            transition: all 0.3s;
            border-left: 6px solid;
            position: relative;
            overflow: hidden;
        }

        .recomendacion-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .recomendacion-card.completada {
            opacity: 0.8;
            background: #f9f9f9;
        }

        .recomendacion-card.completada::after {
            content: '✓';
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 2rem;
            color: #4CAF50;
            opacity: 0.2;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }

        .categoria-badge {
            padding: 6px 12px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
            color: white;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .prioridad-badge {
            padding: 4px 10px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 600;
            color: white;
        }

        .prioridad-alta { background: #f44336; }
        .prioridad-media { background: #FF9800; }
        .prioridad-baja { background: #4CAF50; }

        .recomendacion-titulo {
            font-size: 1.2rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 12px;
        }

        .recomendacion-descripcion {
            color: #666;
            line-height: 1.6;
            margin-bottom: 20px;
            font-size: 0.95rem;
        }

        .recomendacion-meta {
            background: #f9f9f9;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            color: #555;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #eee;
        }

        .fecha-info {
            font-size: 0.85rem;
            color: #999;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .acciones {
            display: flex;
            gap: 8px;
        }

        .accion-btn {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            color: #555;
            background: #f0f0f0;
        }

        .accion-btn:hover {
            transform: scale(1.1);
        }

        .accion-btn.completar:hover {
            background: #4CAF50;
            color: white;
        }

        .accion-btn.editar:hover {
            background: #2196F3;
            color: white;
        }

        .accion-btn.eliminar:hover {
            background: #f44336;
            color: white;
        }

        /* Estado vacío */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: white;
            border-radius: 15px;
            grid-column: 1 / -1;
        }

        .empty-icon {
            font-size: 4rem;
            color: #ddd;
            margin-bottom: 20px;
        }

        .empty-text {
            font-size: 1.2rem;
            color: #999;
            margin-bottom: 15px;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 15px;
            padding: 30px;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }

        .modal-header h2 {
            font-size: 1.4rem;
            color: #333;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .modal-close {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: #f0f0f0;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .modal-close:hover {
            background: #f44336;
            color: white;
            transform: rotate(90deg);
        }

        /* Notificaciones */
        .notification {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: white;
            padding: 16px 24px;
            border-radius: 50px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            gap: 12px;
            transform: translateY(150%);
            transition: transform 0.3s;
            z-index: 1001;
            border-left: 4px solid #4CAF50;
        }

        .notification.show {
            transform: translateY(0);
        }

        .notification i {
            font-size: 1.4rem;
            color: #4CAF50;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .stats-container {
                width: 100%;
            }
            
            .stat-card {
                flex: 1;
            }
            
            .recomendaciones-grid {
                grid-template-columns: 1fr;
            }
            
            .view-options {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header con estadísticas -->
        <div class="header">
            <h1>
                <i class="fas fa-lightbulb"></i>
                Recomendaciones para mejorar
            </h1>
            
            <div class="stats-container">
                <div class="stat-card">
                    <div class="stat-number" id="totalRecomendaciones">0</div>
                    <div class="stat-label">Total</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="pendientesCount">0</div>
                    <div class="stat-label">Pendientes</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="completadasCount">0</div>
                    <div class="stat-label">Completadas</div>
                </div>
            </div>
        </div>

        <!-- ===== FORMULARIO DESPLEGABLE ===== -->
        <div class="form-dropdown-section">
            <div class="form-dropdown-header" onclick="toggleFormDropdown()">
                <h2>
                    <i class="fas fa-plus-circle"></i>
                    Agregar nueva recomendación
                </h2>
                <div class="dropdown-icon" id="formDropdownIcon">
                    <i class="fas fa-chevron-down"></i>
                </div>
            </div>
            
            <div class="form-dropdown-content" id="formDropdownContent">
                <div class="form-container">
                    <form id="recomendacionForm">
                        <div class="form-grid">
                            <div class="form-group">
                                <label class="form-label" for="categoria">
                                    <i class="fas fa-tag"></i>
                                    Categoría
                                </label>
                                <select id="categoria" class="form-control" required>
                                    <option value="">Seleccionar categoría</option>
                                    <option value="inicio">Inicio</option>
                                    <option value="calendario">Calendario</option>
                                    <option value="estudio">Estudio</option>
                                    <option value="iglesia">Iglesia</option>
                                    <option value="economia">Economía</option>
                                    <option value="cuidado-personal">Cuidado Personal</option>
                                    <option value="comidas">Comidas Saludables</option>
                                    <option value="familia">Familia y Mascota</option>
                                    <option value="pareja">Pareja</option>
                                    <option value="notas">Notas</option>
                                    <option value="recomendaciones">Recomendaciones</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label class="form-label" for="prioridad">
                                    <i class="fas fa-exclamation-triangle"></i>
                                    Prioridad
                                </label>
                                <select id="prioridad" class="form-control" required>
                                    <option value="alta">Alta</option>
                                    <option value="media" selected>Media</option>
                                    <option value="baja">Baja</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label class="form-label" for="fechaLimite">
                                    <i class="fas fa-calendar"></i>
                                    Fecha límite (opcional)
                                </label>
                                <input type="date" id="fechaLimite" class="form-control">
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="titulo">
                                <i class="fas fa-heading"></i>
                                Título de la recomendación
                            </label>
                            <input type="text" id="titulo" class="form-control" placeholder="Ej: Organizar mejor el tiempo de estudio" required>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="descripcion">
                                <i class="fas fa-align-left"></i>
                                Descripción detallada
                            </label>
                            <textarea id="descripcion" class="form-control" placeholder="¿Qué debo mejorar? ¿Cómo puedo hacerlo? ¿Por qué es importante?" required></textarea>
                        </div>

                        <div style="display: flex; gap: 15px; justify-content: flex-end;">
                            <button type="reset" class="btn btn-secondary">
                                <i class="fas fa-times"></i>
                                Limpiar
                            </button>
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save"></i>
                                Guardar recomendación
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Filtros y búsqueda -->
        <div class="filters-section">
            <div class="filters-title">
                <i class="fas fa-filter"></i>
                Filtrar por categoría:
            </div>
            
            <div class="filter-badges" id="filtroCategorias">
                <div class="filter-badge active" data-categoria="todas">
                    <i class="fas fa-list"></i>
                    Todas
                </div>
                <!-- Las categorías se cargarán dinámicamente -->
            </div>

            <div class="view-options">
                <button class="view-btn active" data-view="todas">
                    <i class="fas fa-th-large"></i>
                    Todas
                </button>
                <button class="view-btn" data-view="pendientes">
                    <i class="fas fa-clock"></i>
                    Pendientes
                </button>
                <button class="view-btn" data-view="completadas">
                    <i class="fas fa-check-circle"></i>
                    Completadas
                </button>
            </div>
        </div>

        <!-- Grid de recomendaciones -->
        <div id="recomendacionesContainer" class="recomendaciones-grid">
            <!-- Las recomendaciones se cargarán aquí -->
        </div>
    </div>

    <!-- Modal de edición -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2><i class="fas fa-edit"></i> Editar recomendación</h2>
                <button class="modal-close" onclick="cerrarModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <form id="editForm">
                <!-- Se llenará dinámicamente -->
            </form>
        </div>
    </div>

    <!-- Notificación -->
    <div id="notification" class="notification">
        <i class="fas fa-check-circle"></i>
        <span id="notificationMessage">Operación exitosa</span>
    </div>

    <script>
        // Datos de recomendaciones
        let recomendaciones = JSON.parse(localStorage.getItem('recomendaciones')) || [];
        let filtroActual = 'todas';
        let categoriaSeleccionada = 'todas';

        // Categorías disponibles con sus íconos
        const categorias = [
            { id: 'inicio', nombre: 'Inicio', icono: 'fa-home', color: '#2196F3' },
            { id: 'calendario', nombre: 'Calendario', icono: 'fa-calendar-day', color: '#FF9800' },
            { id: 'estudio', nombre: 'Estudio', icono: 'fa-graduation-cap', color: '#4CAF50' },
            { id: 'iglesia', nombre: 'Iglesia', icono: 'fa-church', color: '#9C27B0' },
            { id: 'economia', nombre: 'Economía', icono: 'fa-coins', color: '#f44336' },
            { id: 'cuidado-personal', nombre: 'Cuidado Personal', icono: 'fa-heart', color: '#E91E63' },
            { id: 'comidas', nombre: 'Comidas Saludables', icono: 'fa-apple-alt', color: '#FF5722' },
            { id: 'familia', nombre: 'Familia y Mascota', icono: 'fa-users', color: '#3F51B5' },
            { id: 'pareja', nombre: 'Pareja', icono: 'fa-user-friends', color: '#FF4081' },
            { id: 'notas', nombre: 'Notas', icono: 'fa-sticky-note', color: '#607D8B' },
            { id: 'recomendaciones', nombre: 'Recomendaciones', icono: 'fa-lightbulb', color: '#673AB7' }
        ];

        // Inicialización
        document.addEventListener('DOMContentLoaded', function() {
            cargarCategorias();
            cargarRecomendacionesIniciales();
            actualizarEstadisticas();
            renderizarRecomendaciones();

            // Configurar formulario
            document.getElementById('recomendacionForm').addEventListener('submit', function(e) {
                e.preventDefault();
                guardarRecomendacion();
            });

            // Configurar filtros de vista
            document.querySelectorAll('.view-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    filtroActual = this.dataset.view;
                    renderizarRecomendaciones();
                });
            });

            // Cerrar modal con ESC
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape' && document.getElementById('editModal').classList.contains('active')) {
                    cerrarModal();
                }
            });

            // Cerrar modal haciendo clic fuera
            document.getElementById('editModal').addEventListener('click', function(e) {
                if (e.target === this) {
                    cerrarModal();
                }
            });
        });

        // ===== FUNCIÓN PARA TOGGLE DEL FORMULARIO =====
        function toggleFormDropdown() {
            const content = document.getElementById('formDropdownContent');
            const icon = document.getElementById('formDropdownIcon');
            
            content.classList.toggle('open');
            icon.classList.toggle('open');
        }

        function cargarCategorias() {
            const contenedor = document.getElementById('filtroCategorias');
            
            categorias.forEach(cat => {
                const badge = document.createElement('div');
                badge.className = 'filter-badge';
                badge.dataset.categoria = cat.id;
                badge.innerHTML = `<i class="fas ${cat.icono}"></i> ${cat.nombre}`;
                
                badge.addEventListener('click', function() {
                    document.querySelectorAll('.filter-badge').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    categoriaSeleccionada = this.dataset.categoria;
                    renderizarRecomendaciones();
                });
                
                contenedor.appendChild(badge);
            });
        }

        function cargarRecomendacionesIniciales() {
            if (recomendaciones.length === 0) {
                recomendaciones = [
                    {
                        id: Date.now() - 5,
                        categoria: 'estudio',
                        prioridad: 'alta',
                        fechaLimite: new Date(new Date().setDate(new Date().getDate() + 7)).toISOString().slice(0,10),
                        titulo: 'Organizar mejor el tiempo de estudio',
                        descripcion: 'Dedicar al menos 2 horas diarias al estudio bíblico. Usar la técnica Pomodoro para mantener la concentración.',
                        completada: false,
                        fechaCreacion: new Date().toISOString()
                    },
                    {
                        id: Date.now() - 4,
                        categoria: 'iglesia',
                        prioridad: 'media',
                        fechaLimite: new Date(new Date().setDate(new Date().getDate() + 3)).toISOString().slice(0,10),
                        titulo: 'Ser más puntual en los servicios',
                        descripcion: 'Llegar 15 minutos antes para tener tiempo de preparación espiritual y ayudar en lo que sea necesario.',
                        completada: false,
                        fechaCreacion: new Date().toISOString()
                    },
                    {
                        id: Date.now() - 3,
                        categoria: 'economia',
                        prioridad: 'alta',
                        fechaLimite: new Date(new Date().setDate(new Date().getDate() + 30)).toISOString().slice(0,10),
                        titulo: 'Crear un presupuesto mensual',
                        descripcion: 'Llevar registro de todos los gastos y hacer un presupuesto detallado para ahorrar al menos el 10% de los ingresos.',
                        completada: false,
                        fechaCreacion: new Date().toISOString()
                    },
                    {
                        id: Date.now() - 2,
                        categoria: 'cuidado-personal',
                        prioridad: 'media',
                        fechaLimite: null,
                        titulo: 'Hacer ejercicio 3 veces por semana',
                        descripcion: 'El cuerpo es templo del Espíritu Santo. Mantener una rutina de ejercicio regular para estar saludable.',
                        completada: true,
                        fechaCreacion: new Date().toISOString()
                    },
                    {
                        id: Date.now() - 1,
                        categoria: 'pareja',
                        prioridad: 'alta',
                        fechaLimite: new Date(new Date().setDate(new Date().getDate() + 2)).toISOString().slice(0,10),
                        titulo: 'Tener una noche de cita semanal',
                        descripcion: 'Dedicar tiempo de calidad en pareja, sin distracciones, para fortalecer la relación.',
                        completada: false,
                        fechaCreacion: new Date().toISOString()
                    }
                ];
                localStorage.setItem('recomendaciones', JSON.stringify(recomendaciones));
            }
        }

        function guardarRecomendacion() {
            const nuevaRecomendacion = {
                id: Date.now(),
                categoria: document.getElementById('categoria').value,
                prioridad: document.getElementById('prioridad').value,
                fechaLimite: document.getElementById('fechaLimite').value || null,
                titulo: document.getElementById('titulo').value.trim(),
                descripcion: document.getElementById('descripcion').value.trim(),
                completada: false,
                fechaCreacion: new Date().toISOString()
            };

            recomendaciones.push(nuevaRecomendacion);
            localStorage.setItem('recomendaciones', JSON.stringify(recomendaciones));
            
            document.getElementById('recomendacionForm').reset();
            actualizarEstadisticas();
            renderizarRecomendaciones();
            mostrarNotificacion('¡Recomendación agregada exitosamente!');
            
            // Opcional: cerrar el formulario después de guardar
            // toggleFormDropdown();
        }

        function renderizarRecomendaciones() {
            const contenedor = document.getElementById('recomendacionesContainer');
            
            // Filtrar recomendaciones
            let filtradas = [...recomendaciones];
            
            // Filtrar por categoría
            if (categoriaSeleccionada !== 'todas') {
                filtradas = filtradas.filter(r => r.categoria === categoriaSeleccionada);
            }
            
            // Filtrar por estado
            if (filtroActual === 'pendientes') {
                filtradas = filtradas.filter(r => !r.completada);
            } else if (filtroActual === 'completadas') {
                filtradas = filtradas.filter(r => r.completada);
            }
            
            // Ordenar: pendientes primero, luego completadas
            filtradas.sort((a, b) => {
                if (a.completada === b.completada) {
                    return new Date(b.fechaCreacion) - new Date(a.fechaCreacion);
                }
                return a.completada ? 1 : -1;
            });

            if (filtradas.length === 0) {
                contenedor.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">
                            <i class="fas fa-lightbulb"></i>
                        </div>
                        <div class="empty-text">No hay recomendaciones</div>
                        <p>${categoriaSeleccionada !== 'todas' ? 'No hay recomendaciones en esta categoría' : '¡Haz clic en "Agregar nueva recomendación" para comenzar!'}</p>
                    </div>
                `;
                return;
            }

            contenedor.innerHTML = filtradas.map(recom => {
                const categoria = categorias.find(c => c.id === recom.categoria) || { nombre: recom.categoria, icono: 'fa-tag' };
                const fechaLimite = recom.fechaLimite ? formatDate(recom.fechaLimite) : 'Sin fecha límite';
                const claseCompletada = recom.completada ? 'completada' : '';
                
                return `
                    <div class="recomendacion-card ${claseCompletada}" style="border-left-color: ${categoria.color || '#667eea'};" data-id="${recom.id}">
                        <div class="card-header">
                            <span class="categoria-badge">
                                <i class="fas ${categoria.icono}"></i>
                                ${categoria.nombre}
                            </span>
                            <span class="prioridad-badge prioridad-${recom.prioridad}">
                                ${recom.prioridad === 'alta' ? 'Alta' : recom.prioridad === 'media' ? 'Media' : 'Baja'}
                            </span>
                        </div>
                        
                        <div class="recomendacion-titulo">
                            ${recom.titulo}
                        </div>
                        
                        <div class="recomendacion-descripcion">
                            ${recom.descripcion}
                        </div>
                        
                        <div class="recomendacion-meta">
                            <span>
                                <i class="far fa-calendar"></i>
                                Límite: ${fechaLimite}
                            </span>
                            ${recom.completada ? `
                                <span style="color: #4CAF50;">
                                    <i class="fas fa-check-circle"></i>
                                    Completada
                                </span>
                            ` : ''}
                        </div>
                        
                        <div class="card-footer">
                            <div class="fecha-info">
                                <i class="far fa-clock"></i>
                                Creado: ${formatDate(recom.fechaCreacion)}
                            </div>
                            
                            <div class="acciones">
                                ${!recom.completada ? `
                                    <button class="accion-btn completar" onclick="toggleCompletada(${recom.id})" title="Marcar como completada">
                                        <i class="fas fa-check"></i>
                                    </button>
                                ` : `
                                    <button class="accion-btn completar" onclick="toggleCompletada(${recom.id})" title="Marcar como pendiente" style="background: #4CAF50; color: white;">
                                        <i class="fas fa-undo"></i>
                                    </button>
                                `}
                                
                                <button class="accion-btn editar" onclick="editarRecomendacion(${recom.id})" title="Editar">
                                    <i class="fas fa-edit"></i>
                                </button>
                                
                                <button class="accion-btn eliminar" onclick="eliminarRecomendacion(${recom.id})" title="Eliminar">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function toggleCompletada(id) {
            const index = recomendaciones.findIndex(r => r.id === id);
            if (index !== -1) {
                recomendaciones[index].completada = !recomendaciones[index].completada;
                localStorage.setItem('recomendaciones', JSON.stringify(recomendaciones));
                actualizarEstadisticas();
                renderizarRecomendaciones();
                mostrarNotificacion(recomendaciones[index].completada ? '¡Recomendación completada! 🎉' : 'Recomendación marcada como pendiente');
            }
        }

        function editarRecomendacion(id) {
            const recom = recomendaciones.find(r => r.id === id);
            if (!recom) return;

            const modal = document.getElementById('editModal');
            const modalBody = document.getElementById('editForm');

            modalBody.innerHTML = `
                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label" for="editCategoria">
                            <i class="fas fa-tag"></i> Categoría
                        </label>
                        <select id="editCategoria" class="form-control" required>
                            <option value="">Seleccionar categoría</option>
                            ${categorias.map(cat => `
                                <option value="${cat.id}" ${recom.categoria === cat.id ? 'selected' : ''}>${cat.nombre}</option>
                            `).join('')}
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="editPrioridad">
                            <i class="fas fa-exclamation-triangle"></i> Prioridad
                        </label>
                        <select id="editPrioridad" class="form-control" required>
                            <option value="alta" ${recom.prioridad === 'alta' ? 'selected' : ''}>Alta</option>
                            <option value="media" ${recom.prioridad === 'media' ? 'selected' : ''}>Media</option>
                            <option value="baja" ${recom.prioridad === 'baja' ? 'selected' : ''}>Baja</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="editFechaLimite">
                            <i class="fas fa-calendar"></i> Fecha límite
                        </label>
                        <input type="date" id="editFechaLimite" class="form-control" value="${recom.fechaLimite || ''}">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="editTitulo">
                        <i class="fas fa-heading"></i> Título
                    </label>
                    <input type="text" id="editTitulo" class="form-control" value="${recom.titulo}" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="editDescripcion">
                        <i class="fas fa-align-left"></i> Descripción
                    </label>
                    <textarea id="editDescripcion" class="form-control" rows="5" required>${recom.descripcion}</textarea>
                </div>

                <div style="display: flex; gap: 15px; justify-content: flex-end; margin-top: 20px;">
                    <button type="button" class="btn btn-secondary" onclick="cerrarModal()">
                        <i class="fas fa-times"></i> Cancelar
                    </button>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save"></i> Guardar cambios
                    </button>
                </div>
            `;

            modalBody.onsubmit = function(e) {
                e.preventDefault();
                
                const index = recomendaciones.findIndex(r => r.id === id);
                if (index !== -1) {
                    recomendaciones[index] = {
                        ...recomendaciones[index],
                        categoria: document.getElementById('editCategoria').value,
                        prioridad: document.getElementById('editPrioridad').value,
                        fechaLimite: document.getElementById('editFechaLimite').value || null,
                        titulo: document.getElementById('editTitulo').value.trim(),
                        descripcion: document.getElementById('editDescripcion').value.trim()
                    };
                    
                    localStorage.setItem('recomendaciones', JSON.stringify(recomendaciones));
                    cerrarModal();
                    actualizarEstadisticas();
                    renderizarRecomendaciones();
                    mostrarNotificacion('Recomendación actualizada exitosamente');
                }
            };

            modal.classList.add('active');
        }

        function eliminarRecomendacion(id) {
            if (confirm('¿Estás seguro de eliminar esta recomendación?')) {
                recomendaciones = recomendaciones.filter(r => r.id !== id);
                localStorage.setItem('recomendaciones', JSON.stringify(recomendaciones));
                actualizarEstadisticas();
                renderizarRecomendaciones();
                mostrarNotificacion('Recomendación eliminada');
            }
        }

        function cerrarModal() {
            document.getElementById('editModal').classList.remove('active');
        }

        function actualizarEstadisticas() {
            const total = recomendaciones.length;
            const completadas = recomendaciones.filter(r => r.completada).length;
            const pendientes = total - completadas;

            document.getElementById('totalRecomendaciones').textContent = total;
            document.getElementById('pendientesCount').textContent = pendientes;
            document.getElementById('completadasCount').textContent = completadas;
        }

        function formatDate(dateString) {
            if (!dateString) return '';
            const date = new Date(dateString);
            return date.toLocaleDateString('es-ES', {
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
        }

        function mostrarNotificacion(mensaje) {
            const notification = document.getElementById('notification');
            const messageSpan = document.getElementById('notificationMessage');
            
            messageSpan.textContent = mensaje;
            notification.classList.add('show');
            
            setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }
    </script>
</body>
</html>
