                    showAlert('Éxito', 'Tarea eliminada correctamente');
                }
            );
        }

        function toggleTaskComplete(dateKey, taskIndex) {
            tasks[dateKey][taskIndex].completed = !tasks[dateKey][taskIndex].completed;
            saveTasks();
            loadDayTasks(dateKey);
            renderCalendar(); // Re-renderizar para actualizar la vista
        }

        function saveTasks() {
            localStorage.setItem('calendarTasks', JSON.stringify(tasks));
        }

        function loadTasks() {
            const saved = localStorage.getItem('calendarTasks');
            if (saved) {
                tasks = JSON.parse(saved);
            }
        }

        // ===== EVENT LISTENERS =====
        function setupEventListeners() {
            // Navegación del calendario
            document.getElementById('prevMonth').addEventListener('click', () => {
                currentDate.setMonth(currentDate.getMonth() - 1);
                renderCalendar();
                updateMonthDisplay();
            });
            
            document.getElementById('nextMonth').addEventListener('click', () => {
                currentDate.setMonth(currentDate.getMonth() + 1);
                renderCalendar();
                updateMonthDisplay();
            });
            
            document.getElementById('prevYear').addEventListener('click', () => {
                currentDate.setFullYear(currentDate.getFullYear() - 1);
                renderCalendar();
                updateMonthDisplay();
            });
            
            document.getElementById('nextYear').addEventListener('click', () => {
                currentDate.setFullYear(currentDate.getFullYear() + 1);
                renderCalendar();
                updateMonthDisplay();
            });
            
            document.getElementById('todayBtn').addEventListener('click', () => {
                currentDate = new Date();
                renderCalendar();
                updateMonthDisplay();
            });
            
            document.getElementById('monthSelect').addEventListener('change', (e) => {
                currentDate.setMonth(parseInt(e.target.value));
                renderCalendar();
            });
            
            // Filtros de categorías
            document.addEventListener('click', function(e) {
                if (e.target.closest('.filter-tag')) {
                    const tag = e.target.closest('.filter-tag');
                    tag.classList.toggle('active');
                    const category = tag.dataset.category;
                    
                    if (tag.classList.contains('active')) {
                        if (!activeFilters.includes(category)) {
                            activeFilters.push(category);
                        }
                    } else {
                        activeFilters = activeFilters.filter(cat => cat !== category);
                    }
                    
                    renderCalendar();
                }
            });
            
            // Categorías en el formulario
            document.addEventListener('click', function(e) {
                if (e.target.closest('.category-option')) {
                    const option = e.target.closest('.category-option');
                    document.querySelectorAll('.category-option').forEach(opt => opt.classList.remove('selected'));
                    option.classList.add('selected');
                    document.getElementById('taskCategory').value = option.dataset.cat;
                }
            });
            
            // Configuración de categorías
            document.getElementById('toggleConfig').addEventListener('click', function() {
                const categoriesList = document.getElementById('categoriesList');
                categoriesList.classList.toggle('active');
                const icon = this.querySelector('i');
                const span = this.querySelector('span');
                
                if (categoriesList.classList.contains('active')) {
                    icon.className = 'fas fa-chevron-up';
                    span.textContent = 'Ocultar';
                } else {
                    icon.className = 'fas fa-chevron-down';
                    span.textContent = 'Mostrar';
                }
            });
            
            // Botón añadir categoría
            document.getElementById('addCategoryBtn').addEventListener('click', addNewCategory);
            
            // Modal y formulario de tareas
            document.getElementById('closeModal').addEventListener('click', closeTaskModal);
            document.getElementById('cancelTask').addEventListener('click', closeTaskModal);
            document.getElementById('taskModal').addEventListener('click', function(e) {
                if (e.target === this) {
                    closeTaskModal();
                }
            });
            
            document.getElementById('taskForm').addEventListener('submit', saveTask);
            
            // Cerrar modales con Escape
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    closeTaskModal();
                    document.getElementById('categoryModal').classList.remove('active');
                }
            });
            
            // Inicializar primera categoría como seleccionada
            if (categories.length > 0) {
                document.querySelectorAll('.category-option')[0]?.classList.add('selected');
            }
        }

        function closeTaskModal() {
            document.getElementById('taskModal').classList.remove('active');
            selectedDate = null;
            editingTaskId = null;
            
            // Limpiar selección en calendario
            document.querySelectorAll('.day.selected').forEach(el => el.classList.remove('selected'));
        }
    </script>
</body>
